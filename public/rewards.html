<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Customer Rewards</title>
<script src="/garvey_ui.js"></script>
<style>
  :root {
    --bg: #0A0A0A;
    --panel: #1A1A1A;
    --panel-2: #111111;
    --primary: #FF2E2E;
    --success: #00FF9C;
    --gold: #FFD700;
    --text: #F7F7F7;
    --muted: #A3A3A3;
    --glow-red: 0 0 18px rgba(255, 46, 46, 0.28);
    --glow-green: 0 0 22px rgba(0, 255, 156, 0.3);
  }
  * { box-sizing: border-box; }
  body {
    font-family: "Inter", "Segoe UI", Roboto, Arial, sans-serif;
    background:
      radial-gradient(circle at top right, rgba(255, 46, 46, 0.11), transparent 40%),
      radial-gradient(circle at top left, rgba(255, 215, 0, 0.08), transparent 35%),
      var(--bg);
    color: var(--text);
    padding: 16px;
    margin: 0;
  }
  .card {
    background: linear-gradient(180deg, var(--panel), var(--panel-2));
    border: 1px solid rgba(255, 215, 0, 0.55);
    border-radius: 16px;
    padding: 18px;
    margin: 0 auto 14px;
    max-width: 900px;
    box-shadow: var(--glow-red);
    transition: transform 220ms ease, box-shadow 220ms ease;
  }
  .card:hover { transform: translateY(-2px); }
  h1, h2 { color: var(--gold); margin: 0 0 10px; letter-spacing: 0.3px; }
  h1 { font-size: 1.6rem; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
  input, textarea, select {
    width: 100%;
    padding: 11px 12px;
    border-radius: 10px;
    border: 1px solid #2D2D2D;
    background: #111;
    color: var(--text);
    transition: border-color 180ms ease, box-shadow 180ms ease;
  }
  input:focus, textarea:focus, select:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: var(--glow-red);
  }
  textarea { min-height: 82px; }
  .btn {
    padding: 10px 14px;
    border: 1px solid transparent;
    border-radius: 10px;
    background: var(--primary);
    color: #fff;
    font-weight: 700;
    cursor: pointer;
    transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
  }
  .btn:hover {
    transform: translateY(-1px);
    border-color: var(--gold);
    box-shadow: var(--glow-red);
  }
  .muted { color: var(--muted); font-size: 12px; }
  .ok {
    color: var(--success);
    font-weight: 700;
    text-shadow: 0 0 10px rgba(0, 255, 156, 0.35);
  }
  pre {
    white-space: pre-wrap;
    word-break: break-word;
    background: #0D0D0D;
    border: 1px solid #2D2D2D;
    border-radius: 10px;
    padding: 10px;
  }
  a { color: #E5E5E5; }
  a:hover { color: var(--gold); }
</style>
</head>
<body>
  <div class="card">
    <h1>🎁 Return Engine — Rewards</h1>
    <div id="tenantLine" class="muted"></div>

    <div class="row">
      <input id="email" placeholder="customer@email.com" autocomplete="email" />
    </div>

    <div class="row">
      <a id="backHome" href="#">← Back</a>
      <a id="openDash" href="#">View Dashboard</a>
      <button id="refreshStatusBtn" class="btn" type="button">Refresh Status</button>
    </div>

    <pre id="statusPane">Status not loaded yet.</pre>
  </div>

  <div class="card">
    <h2>Quick actions</h2>
    <div class="row">
      <button id="checkinBtn" class="btn" type="button">+ Check-in</button>

      <select id="actionType">
        <option value="review">Action: review</option>
        <option value="photo">Action: photo</option>
        <option value="video">Action: video</option>
        <option value="referral">Action: referral</option>
      </select>

      <button id="actionBtn" class="btn" type="button">+ Action</button>
    </div>
  </div>

  <div class="card">
    <h2>Engagement actions</h2>

    <label>Review text
      <textarea id="reviewText" placeholder="Great service!"></textarea>
    </label>

    <div class="row">
      <select id="mediaType">
        <option value="">media_type: none</option>
        <option value="photo">photo</option>
        <option value="video">video</option>
      </select>
      <button id="reviewBtn" class="btn" type="button">Submit Review</button>
    </div>
    <label>Optional review photo/video (upload coming soon)
      <input id="reviewMediaFile" type="file" accept="image/*,video/*" />
    </label>

    <label>Referred email
      <input id="referredEmail" placeholder="friend@email.com" autocomplete="email" />
    </label>

    <div class="row">
      <button id="referralBtn" class="btn" type="button">Submit Referral</button>
    </div>

    <label>Wishlist product
      <input id="productName" placeholder="Product name" />
    </label>

    <div class="row">
      <button id="wishlistBtn" class="btn" type="button">Add Wishlist</button>
    </div>
  </div>

  <div class="card">
    <h2>Result</h2>
    <div id="resultMessage" class="ok">Run an action to see result.</div>
    <button id="toggleDebugBtn" class="btn" type="button">Toggle Debug JSON</button>
    <pre id="result">Run an action to see response JSON.</pre>
  </div>

<script src="/js/api-contract.js"></script>
<script src="/engine/customer-return-engine.js"></script>
<script>
"use strict";

const engine = window.CustomerReturnEngine.createDefaultEngine();

function safeTrim(v) { return String(v ?? "").trim(); }
function readEmail() { return safeTrim(document.getElementById("email")?.value).toLowerCase(); }
function currentCtx() {
  const base = (window.GARVEY && window.GARVEY.ctx) ? window.GARVEY.ctx() : {};
  const q = new URLSearchParams(location.search);
  return {
    tenant: safeTrim(q.get("tenant") || base.tenant),
    email: safeTrim(q.get("email") || base.email).toLowerCase(),
    cid: safeTrim(q.get("cid") || base.cid),
    rid: safeTrim(q.get("crid") || q.get("rid") || base.rid),
  };
}

function showResult(payload) {
  document.getElementById("result").textContent = JSON.stringify(payload, null, 2);
  const pointsAdded = Number(payload?.points_added || 0);
  const total = Number(payload?.points || payload?.user?.points || 0);
  let msg = "Action recorded successfully.";
  if (payload?.event === "checkin") msg = `Check-in successful: +${pointsAdded} points (Total: ${total})`;
  else if (payload?.review) msg = `Review submitted: +${pointsAdded} points (Total: ${total})`;
  else if (payload?.action_type) msg = `Action submitted: +${pointsAdded} points (Total: ${total})`;
  else if (payload?.wishlist_entry) msg = "Wishlist item saved successfully.";
  document.getElementById("resultMessage").textContent = msg;
}

function showStatus(payload) {
  document.getElementById("statusPane").textContent = JSON.stringify(payload, null, 2);
}

async function refreshStatus() {
  const status = await engine.getStatus({ email: readEmail() || undefined });
  showStatus(status);
  return status;
}

async function run() {
  const ctx = currentCtx();
  if (!ctx.tenant) {
    const msg = "tenant query param is required, e.g. /rewards.html?tenant=test-business";
    showResult({ error: msg });
    showStatus({ error: "tenant missing" });
    document.getElementById("tenantLine").textContent = msg;
    return;
  }

  engine.init(ctx);
  if (window.GARVEY && window.GARVEY.setLoginCtx) {
    window.GARVEY.setLoginCtx(ctx);
  }

  if (ctx.email) document.getElementById("email").value = ctx.email;
  document.getElementById("tenantLine").textContent = `Tenant: ${ctx.tenant}${ctx.cid ? ` • CID: ${ctx.cid}` : ""}${ctx.rid ? ` • CRID: ${ctx.rid}` : ""}`;

  const back = new URL(`/index.html`, location.origin);
  back.searchParams.set("tenant", ctx.tenant);
  if (ctx.cid) back.searchParams.set("cid", ctx.cid);
  document.getElementById("backHome").href = back.pathname + back.search;

  const dash = new URL(`/dashboard.html`, location.origin);
  dash.searchParams.set("tenant", ctx.tenant);
  if (ctx.email) dash.searchParams.set("email", ctx.email);
  if (ctx.cid) dash.searchParams.set("cid", ctx.cid);
  if (ctx.rid) dash.searchParams.set("rid", ctx.rid);
  document.getElementById("openDash").href = dash.pathname + dash.search;

  const requireEmail = () => {
    const email = readEmail();
    if (!email) throw new Error("email is required");
    engine.init({ email });
    return email;
  };

  document.getElementById("refreshStatusBtn").onclick = () => {
    refreshStatus().catch((err) => showResult({ error: err.message }));
  };

  document.getElementById("checkinBtn").onclick = async () => {
    try {
      requireEmail();
      const data = await engine.awardReward({ type: "checkin" });
      showResult(data);
      await refreshStatus();
    } catch (err) { showResult({ error: err.message }); }
  };

  document.getElementById("actionBtn").onclick = async () => {
    try {
      requireEmail();
      const data = await engine.awardReward({ type: "action", action_type: document.getElementById("actionType").value });
      showResult(data);
      await refreshStatus();
    } catch (err) { showResult({ error: err.message }); }
  };

  document.getElementById("reviewBtn").onclick = async () => {
    try {
      requireEmail();
      const text = safeTrim(document.getElementById("reviewText").value);
      const mediaType = safeTrim(document.getElementById("mediaType").value);
      const mediaFile = document.getElementById("reviewMediaFile").files[0];
      const data = await engine.awardReward({
        type: "review",
        text,
        media_type: mediaFile ? (mediaFile.type.startsWith("video/") ? "video" : "photo") : mediaType || undefined,
        media_note: mediaFile ? "upload coming soon" : undefined,
      });
      showResult(data);
      await refreshStatus();
    } catch (err) { showResult({ error: err.message }); }
  };

  document.getElementById("referralBtn").onclick = async () => {
    try {
      requireEmail();
      const data = await engine.awardReward({
        type: "referral",
        referred_email: safeTrim(document.getElementById("referredEmail").value).toLowerCase(),
      });
      showResult(data);
      await refreshStatus();
    } catch (err) { showResult({ error: err.message }); }
  };

  document.getElementById("wishlistBtn").onclick = async () => {
    try {
      requireEmail();
      const data = await engine.awardReward({
        type: "wishlist",
        product_name: safeTrim(document.getElementById("productName").value),
      });
      showResult(data);
      await refreshStatus();
    } catch (err) { showResult({ error: err.message }); }
  };

  await refreshStatus();
  engine.getLedger().catch(() => null);

  document.getElementById("toggleDebugBtn").onclick = () => {
    const el = document.getElementById("result");
    el.style.display = el.style.display === "none" ? "block" : "none";
  };
  document.getElementById("result").style.display = "none";
}

run();
</script>

</body>
</html>
