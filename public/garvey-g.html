<!-- FILE: public/garvey-g.html -->
<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script>
  (function () {
    const host = location.hostname || "";
    if (host.includes("garveyfrontend.onrender.com")) {
      location.replace("https://garveybackend.onrender.com" + location.pathname + location.search);
    }
  })();
</script>
  <title>GARVEY — G (Gather)</title>
  <link rel="stylesheet" href="/garvey.css">
  <script src="/garvey_ui.js" defer></script>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="row">
      <a class="btn" id="back" href="#">Back to Hub</a>
      <div class="pill" id="tenantPill"></div>
    </div>
    <h1>G — Gather</h1>
    <div class="muted">Define the business. Capture basics. Start organized.</div>
  </div>

  <div id="kanban"></div>
</div>

<script type="module">
import { ensureBoard, getBoard, getCards, createCard, moveCard, renderKanban } from "/garvey-kanban.js";

const ctx = (window.GARVEY && window.GARVEY.ctx) ? window.GARVEY.ctx() : (function(){ const p = new URLSearchParams(location.search); return { tenant: String(p.get("tenant") || "").trim(), email: String(p.get("email") || "").trim().toLowerCase(), rid: String(p.get("rid") || "").trim(), cid: String(p.get("cid") || "").trim() }; })();
const tenant = String(ctx.tenant || "").trim();
const withCtx = (window.GARVEY && window.GARVEY.withCtx)
  ? window.GARVEY.withCtx
  : (href) => href;
document.getElementById("tenantPill").textContent = "Tenant: " + (tenant || "(missing)");
document.getElementById("back").href = withCtx("/garvey.html");

const phase = "G";
const mount = document.getElementById("kanban");

async function refresh() {
  await ensureBoard(tenant);
  const b = await getBoard(tenant);
  const c = await getCards(tenant, phase);
  renderKanban({
    mount,
    tenant,
    phase,
    columns: b.columns || [],
    cards: c.cards || [],
    onCreate: async (payload) => { await createCard(payload); await refresh(); },
    onMove: async (id, to) => { await moveCard(id, to); await refresh(); },
  });
}

refresh();
</script>
</body>
</html>
