<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Adaptive Progress Dashboard</title><style>body{font-family:system-ui;background:#0f172a;color:#e5e7eb;margin:0;padding:24px}.card{background:#111827;border:1px solid #334155;border-radius:18px;padding:18px;margin:14px 0}table{width:100%;border-collapse:collapse}th,td{border-bottom:1px solid #334155;padding:10px;text-align:left}.pill{display:inline-block;border-radius:999px;padding:4px 10px;background:#1e293b}.done{background:#14532d}.progress{background:#713f12}.todo{background:#374151}</style></head><body><main><h1>Parent/Admin Adaptive Progress Dashboard</h1><p id="status">Loading Princess Nia’s progress…</p><section id="app"></section></main><script>
(async function(){const app=document.getElementById('app'),status=document.getElementById('status');function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}function row(cells){return '<tr>'+cells.map(v=>'<td>'+v+'</td>').join('')+'</tr>'}try{const children=await (await fetch('/api/gates/children',{credentials:'same-origin'})).json();const list=Array.isArray(children.children)?children.children:[];const child=list.find(c=>String(c.child_name||'').trim().toLowerCase()==='princess nia')||list[0];if(!child)throw new Error('No learner profile is available for this parent session.');const data=await (await fetch('/api/adaptive-v2/parent-dashboard/'+encodeURIComponent(child.child_id),{credentials:'same-origin'})).json();if(!data.ok)throw new Error(data.error||'Dashboard failed');status.textContent='Showing saved progress for '+(child.child_name||'learner')+' (profile ID '+child.child_id+').';const assessments=(data.assessments||[]).map(a=>row([esc(a.subject+' '+a.grade),esc(a.assessment_role),esc(a.status),esc(a.current_question_position),esc(a.completed_at||a.updated_at||a.created_at)]));const skills=(data.skill_worlds||[]).map(s=>{const cls=s.status==='completed'?'done':(s.progress_percent>0?'progress':'todo');return row([esc(s.skill_id),esc(s.mode),'<span class="pill '+cls+'">'+esc(s.status)+'</span>',esc(s.progress_percent)+'%',esc(s.score_percent)+'%',esc(s.attempts),esc(s.updated_at||s.created_at)]);});const adaptive=(data.adaptive_progress||[]).map(p=>row([esc(p.selected_skill_id),esc(p.mastery_band),esc(p.correct_count)+'/'+esc(p.total_count),esc(p.checkpoint_attempts),esc(p.next_recommended_skill_id),esc(p.updated_at)]));app.innerHTML='<div class="card"><h2>What to work on next</h2><p>'+esc(data.next_recommendation)+'</p></div><div class="card"><h2>Math assessments / activities</h2><table><thead><tr><th>Assessment</th><th>Type</th><th>Status</th><th>Position</th><th>Date</th></tr></thead><tbody>'+(assessments.join('')||'<tr><td colspan="5">No saved assessments yet.</td></tr>')+'</tbody></table></div><div class="card"><h2>Assigned Skill Worlds</h2><table><thead><tr><th>Skill World</th><th>Mode</th><th>Status</th><th>Progress</th><th>Score</th><th>Attempts</th><th>Last Activity</th></tr></thead><tbody>'+(skills.join('')||'<tr><td colspan="7">No saved Skill World activity yet.</td></tr>')+'</tbody></table></div><div class="card"><h2>Adaptive checkpoint summary</h2><table><thead><tr><th>Skill</th><th>Mastery</th><th>Score</th><th>Attempts</th><th>Next</th><th>Last Activity</th></tr></thead><tbody>'+(adaptive.join('')||'<tr><td colspan="6">No checkpoints saved yet.</td></tr>')+'</tbody></table></div>';}catch(err){status.textContent='Unable to load dashboard: '+(err.message||err);}})();
</script></body></html>
