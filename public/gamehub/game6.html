<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Spelling Match Arena</title>
  <style>
    body { font-family: Arial; background: #111; color: #fff; text-align: center; }
    .game-box { margin-top: 40px; }
    button {
      padding: 12px 20px; margin: 10px; border: none; border-radius: 6px;
      background: #00aaff; color: white; font-size: 18px; cursor: pointer;
    }
    .option {
      background: #222; padding: 15px; margin: 10px;
      border-radius: 8px; cursor: pointer; font-size: 20px;
    }
    .option:hover { background: #333; }

    #pointsSplash {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: 50px; display: none; color: yellow;
    }
  </style>

  <style id="gamehub-shared-identity-style">
    .gamehub-shared-identity { display:flex; align-items:center; justify-content:space-between; gap:0.75rem; flex-wrap:wrap; margin: 0 0 0.75rem; padding: 0.55rem 0.75rem; border-radius: 10px; border: 1px solid rgba(148,163,184,0.45); background: rgba(15,23,42,0.16); }
    .gamehub-shared-badge { font-size: 0.78rem; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 700; opacity: 0.95; }
    .gamehub-practice-mode { font-size: 0.85rem; font-weight: 600; opacity: 0.92; }
    .gamehub-back-link { font-size: 0.85rem; font-weight: 700; text-decoration: none; border-bottom: 1px solid currentColor; }
  </style>

</head>
<body>

<h1>Spelling Match Arena</h1>
<p id="modeNotice">Practice mode: Standard</p>
<p id="modeFraming">Select your game mode</p>

<div id="menu">
  <button onclick="startSpeedMatch()">Speed Match</button>
  <button onclick="startSynonym()">Synonym Smash</button>
  <button onclick="startAntonym()">Antonym Hunter</button>
  <button onclick="startDefinitionMatch()">Word Match</button>
</div>

<div id="game" class="game-box"></div>
<div id="pointsSplash">+10</div>

<script src="/gamehub/shared-content-loader.js"></script>
<script src="/gamehub/gamehub-session-adapter.js"></script>
<script>
// ---------------------- WORD BANK -----------------------
let words = [
  { word:"reluctant", def:"unwilling", syn:"hesitant", ant:"eager" },
  { word:"vital", def:"necessary for life", syn:"essential", ant:"unimportant" },
  { word:"peculiar", def:"strange or unusual", syn:"odd", ant:"normal" },
  { word:"scarce", def:"hard to find", syn:"rare", ant:"abundant" },
  { word:"immense", def:"very large", syn:"enormous", ant:"tiny" },
  { word:"influence", def:"power to affect", syn:"impact", ant:"ignore" }
];

let score = 0;

async function initializeSharedContent(){
  if(!window.GamehubSharedContent) return;
  const bank = await window.GamehubSharedContent.loadWordBank('/gamehub/content/word-bank.sample.json', null);
  if(!bank) return;
  const sharedWords = window.GamehubSharedContent.fromWordBankToGame6Set(bank);
  if(sharedWords.length){
    const merged = new Map();
    words.forEach((item)=>merged.set(item.word.toLowerCase(), item));
    sharedWords.forEach((item)=>merged.set(item.word.toLowerCase(), item));
    words = Array.from(merged.values());
  }
}
initializeSharedContent();

const GAME_KEY = "game6";
const SESSION_MODE = "local_pilot";
const ACTIVITY_KEYS = Object.freeze({
  SPEED: "speed_mode",
  SYNONYM: "synonym_mode",
  ANTONYM: "antonym_mode",
  DEFINITION: "definition_mode"
});

const GAME_RUNTIME_CONTEXT_FALLBACK={child_display_name:"Player",child_age_band:null,profile_id:null,session_id:null,gate_context:null,practice_path:null,mode_preset:"standard"};
function normalizeModePreset(v){const c=typeof v==="string"?v.trim().toLowerCase():"";return c==="support"||c==="challenge"?c:"standard"}
function labelModePreset(v){const n=normalizeModePreset(v);return n.charAt(0).toUpperCase()+n.slice(1)}
function getLaunchContext(){const params=new URLSearchParams(window.location.search);const raw=window.__GATES_GAME_CONTEXT__||window.__GAME_RUNTIME_CONTEXT__||{};const merged={...GAME_RUNTIME_CONTEXT_FALLBACK,...raw};if(params.has("gate_context")) merged.gate_context=params.get("gate_context");if(params.has("practice_path")) merged.practice_path=params.get("practice_path");if(params.has("mode_preset")) merged.mode_preset=params.get("mode_preset");return {...merged,mode_preset:normalizeModePreset(merged.mode_preset)}}
const launchContext=getLaunchContext();
const game6PresetConfig={support:{durationBands:[2200,6000],menuFraming:"Support mode keeps round timing gentle."},standard:{durationBands:[1500,5000],menuFraming:"Select your game mode"},challenge:{durationBands:[1200,3800],menuFraming:"Challenge mode expects faster, longer focus rounds."}};
const appliedGame6Preset=game6PresetConfig[launchContext.mode_preset]||game6PresetConfig.standard;
const adapter = window.GamehubSessionAdapter || null;
let adapterSessionStarted = false;
let activeActivityKey = null;
let roundStartAt = 0;
let missesBeforeSuccess = 0;

function emitAdapterEvent(eventName, payload){
  if(adapter && typeof adapter.emit === "function") adapter.emit(eventName, payload);
}

function ensureAdapterSession(){
  if(adapterSessionStarted || !adapter) return;
  if(typeof adapter.startSession === "function") {
    adapter.startSession({ game_key: GAME_KEY, mode: SESSION_MODE });
  }
  adapterSessionStarted = true;
  emitAdapterEvent("game_session_started", { game_key: GAME_KEY, activity_key: ACTIVITY_KEYS.SPEED, mode: SESSION_MODE });
}

function beginActivity(activityKey){
  ensureAdapterSession();
  activeActivityKey = activityKey;
  missesBeforeSuccess = 0;
  emitAdapterEvent("activity_selected", { game_key: GAME_KEY, activity_key: activityKey, mode: SESSION_MODE });
  emitAdapterEvent("round_started", { game_key: GAME_KEY, activity_key: activityKey, mode: SESSION_MODE });
  roundStartAt = Date.now();
}

function getDurationBand(ms){
  if(ms < appliedGame6Preset.durationBands[0]) return "quick";
  if(ms < appliedGame6Preset.durationBands[1]) return "steady";
  return "extended";
}

function getAccuracyBand(){
  if(missesBeforeSuccess === 0) return "perfect";
  if(missesBeforeSuccess === 1) return "recovering";
  return "persisting";
}

function getPersistenceBand(){
  if(missesBeforeSuccess === 0) return "steady";
  if(missesBeforeSuccess === 1) return "recovering";
  return "persistent";
}

function trackRoundOutcome(success){
  if(!activeActivityKey) return;
  const elapsed = Math.max(0, Date.now() - roundStartAt);
  emitAdapterEvent("round_completed", {
    game_key: GAME_KEY,
    activity_key: activeActivityKey,
    mode: SESSION_MODE,
    success,
    duration_band: getDurationBand(elapsed),
    accuracy_band: getAccuracyBand(),
    persistence_band: getPersistenceBand()
  });
  emitAdapterEvent("round_started", { game_key: GAME_KEY, activity_key: activeActivityKey, mode: SESSION_MODE });
  roundStartAt = Date.now();
}

window.addEventListener("beforeunload", () => {
  if(!adapterSessionStarted) return;
  const summary = {
    game_key: GAME_KEY,
    activity_key: activeActivityKey || ACTIVITY_KEYS.SPEED,
    mode: SESSION_MODE,
    completion_state: "manual_exit",
    duration_band: "steady",
    persistence_band: getPersistenceBand()
  };
  emitAdapterEvent("game_session_ended", summary);
  if(adapter && typeof adapter.endSession === "function") adapter.endSession(summary);
});

const modeNoticeEl=document.getElementById("modeNotice"); if(modeNoticeEl) modeNoticeEl.textContent=`Practice mode: ${labelModePreset(launchContext.mode_preset)}`;
const modeFramingEl=document.getElementById("modeFraming"); if(modeFramingEl) modeFramingEl.textContent=appliedGame6Preset.menuFraming;

// ---------------------- UTILITIES -----------------------
function splashPoints(){
  const sp = document.getElementById("pointsSplash");
  sp.style.display = "block";
  setTimeout(()=> sp.style.display="none", 500);
}

// ---------------------- SPEED MATCH -----------------------
function startSpeedMatch(){
  document.getElementById("menu").style.display="none";
  beginActivity(ACTIVITY_KEYS.SPEED);
  runSpeedRound();
}

function runSpeedRound(){
  const w = words[Math.floor(Math.random()*words.length)];
  const options = shuffle([
    w.def,
    words[Math.floor(Math.random()*words.length)].def,
    words[Math.floor(Math.random()*words.length)].def
  ]);

  document.getElementById("game").innerHTML = `
    <h2>${w.word}</h2>
    ${options.map(o=>`<div class='option' onclick="checkSpeed('${o}','${w.def}')">${o}</div>`).join("")}
  `;
}

function checkSpeed(choice, correct){
  const success = choice === correct;
  if(success){
    score += 10;
    splashPoints();
    if(missesBeforeSuccess > 0){
      emitAdapterEvent("recovery_after_miss", { game_key: GAME_KEY, activity_key: activeActivityKey, mode: SESSION_MODE, event_category: "round_recovered" });
    }
    trackRoundOutcome(true);
    missesBeforeSuccess = 0;
  } else {
    missesBeforeSuccess += 1;
    emitAdapterEvent("retry_started", { game_key: GAME_KEY, activity_key: activeActivityKey, mode: SESSION_MODE, event_category: "round_retry" });
  }
  runSpeedRound();
}

// ---------------------- SYNONYM SMASH -----------------------
function startSynonym(){
  document.getElementById("menu").style.display="none";
  beginActivity(ACTIVITY_KEYS.SYNONYM);
  runSynRound();
}

  const w = words[Math.floor(Math.random()*words.length)];
  const options = shuffle([
    w.syn,

    <h2>${w.word}</h2>

  `;
}

  if(success){
    score += 10;
    splashPoints();
    if(missesBeforeSuccess > 0){
      emitAdapterEvent("recovery_after_miss", { game_key: GAME_KEY, activity_key: activeActivityKey, mode: SESSION_MODE, event_category: "round_recovered" });
    }
    trackRoundOutcome(true);
    missesBeforeSuccess = 0;
  } else {
    missesBeforeSuccess += 1;
    emitAdapterEvent("retry_started", { game_key: GAME_KEY, activity_key: activeActivityKey, mode: SESSION_MODE, event_category: "round_retry" });
  }
  runSynRound();
}

// ---------------------- ANTONYM HUNTER -----------------------
function startAntonym(){
  document.getElementById("menu").style.display="none";
  beginActivity(ACTIVITY_KEYS.ANTONYM);
  runAntRound();
}

  const w = words[Math.floor(Math.random()*words.length)];
  const options = shuffle([
    w.ant,

    words[Math.floor(Math.random()*words.length)].ant

    <h2>${w.word}</h2>
    ${options.map(o=>`<div class='option' onclick="checkAnt('${o}','${w.ant}')">${o}</div>`).join("")}
  `;
}

function checkAnt(choice, correct){
  const success = choice === correct;
  if(success){
    score += 10;
    splashPoints();
    if(missesBeforeSuccess > 0){
      emitAdapterEvent("recovery_after_miss", { game_key: GAME_KEY, activity_key: activeActivityKey, mode: SESSION_MODE, event_category: "round_recovered" });
    }
    trackRoundOutcome(true);
    missesBeforeSuccess = 0;
  } else {
    missesBeforeSuccess += 1;
    emitAdapterEvent("retry_started", { game_key: GAME_KEY, activity_key: activeActivityKey, mode: SESSION_MODE, event_category: "round_retry" });
  }
  runAntRound();
}

// ---------------------- DEFINITION MATCH -----------------------
function startDefinitionMatch(){
  document.getElementById("menu").style.display="none";
  beginActivity(ACTIVITY_KEYS.DEFINITION);
  runDefRound();
}

function runDefRound(){
  const w = words[Math.floor(Math.random()*words.length)];
  const options = shuffle([
    w.def,
    words[Math.floor(Math.random()*words.length)].def,
    words[Math.floor(Math.random()*words.length)].def
  ]);

  document.getElementById("game").innerHTML = `
    <h2>${w.word}</h2>
    ${options.map(o=>`<div class='option' onclick="checkDef('${o}','${w.def}')">${o}</div>`).join("")}
  `;
}

function checkDef(choice, correct){
  const success = choice === correct;
  if(success){
    score += 10;
    splashPoints();
    if(missesBeforeSuccess > 0){
      emitAdapterEvent("recovery_after_miss", { game_key: GAME_KEY, activity_key: activeActivityKey, mode: SESSION_MODE, event_category: "round_recovered" });
    }
    trackRoundOutcome(true);
    missesBeforeSuccess = 0;
  } else {
    missesBeforeSuccess += 1;
    emitAdapterEvent("retry_started", { game_key: GAME_KEY, activity_key: activeActivityKey, mode: SESSION_MODE, event_category: "round_retry" });
  }
  runDefRound();
}

// ---------------------- SHUFFLE UTILITY -----------------------
function shuffle(arr){
  return arr.sort(()=>Math.random()-0.5);
}
</script>


<script>
(function addGameHubSharedIdentity(){
  if (window.__gamehubSharedIdentityMounted) return;
  window.__gamehubSharedIdentityMounted = true;
  const body = document.body;
  if (!body) return;
  const host = document.createElement('div');
  host.className = 'gamehub-shared-identity';
  const params = new URLSearchParams(window.location.search || '');
  const mode = (params.get('mode_preset') || 'standard').toLowerCase();
  const modeLabel = mode.charAt(0).toUpperCase() + mode.slice(1);
  host.innerHTML = `
    <div class="gamehub-shared-badge">GameHub Practice</div>
    <div class="gamehub-practice-mode" aria-live="polite">Practice mode: ${modeLabel}</div>
    <a class="gamehub-back-link" href="/gamehub/index.html">Back to GameHub</a>
  `;
  body.insertBefore(host, body.firstChild);
})();
</script>

</body>
</html>
