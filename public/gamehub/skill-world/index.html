<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width, initial-scale=1'><title>Skill World Generator</title><link rel='stylesheet' href='/gamehub/skill-world/skill-world.css'></head><body>
<div id='app'><main class="skill-world-shell"><header class="skill-world-header"><h1>Skill World: Loading Mission</h1><p class="mission-subtitle">Preparing your full mission.</p></header></main></div>
<script src='/gamehub/skill-world/engine/recommendation-helper.js'></script>
<script src='/gamehub/skill-world/engine/growth-data-adapter.js'></script>
<script src='/gamehub/skill-world/engine/skill-package-schema.js'></script>
<script src='/gamehub/skill-world/renderers/visual-model-registry.js'></script>
<script src='/gamehub/skill-world/screens/story-mission-screen.js'></script><script src='/gamehub/skill-world/screens/mini-lesson-screen.js'></script><script src='/gamehub/skill-world/screens/worked-example-screen.js'></script><script src='/gamehub/skill-world/screens/guided-demo-screen.js'></script><script src='/gamehub/skill-world/screens/question-zone-screen.js'></script><script src='/gamehub/skill-world/screens/checkpoint-screen.js'></script><script src='/gamehub/skill-world/screens/badge-screen.js'></script><script src='/gamehub/skill-world/screens/growth-profile-screen.js'></script>
<script src='/gamehub/skill-world/engine/skill-world-renderer.js'></script>
<script>
(async function(){
 const parts=location.pathname.split('/').filter(Boolean); const drillPath=parts[parts.length-1]==='drill'; const id=((drillPath?parts[parts.length-2]:parts[parts.length-1])||'G1M_DP_001').toUpperCase(); const app=document.getElementById('app');
 try{const p=await (await fetch(`/gamehub/skill-world/content/${id}.skill-package.v1.json`)).json(); const learnerCtx=await resolveSkillWorldLearner(); const state=SkillWorldRenderer.createState(); if(drillPath)state.mode='drill'; await loadPersistedSkillWorld(state,id,learnerCtx);
 function render(){const rendered=SkillWorldRenderer.renderSkillWorld(p,{state,mode:state.mode,failClosed:true,profile:state.profile}); app.innerHTML=rendered.html; app.querySelectorAll('.exit-hub').forEach((link)=>{link.href=learnerCtx.return_url||'/gamehub/adaptive-grade1-v2.html';}); window.scrollTo({top:0,behavior:'smooth'});}
 function activeQuestion(section){const step=Number(section?.dataset?.stepIndex||state.stepIndex||0); return SkillWorldRenderer.zoneQuestion(p,step);}
 function answerFeedback(section,result){const fb=section.querySelector('.feedback-area'); if(!fb)return; fb.className=`feedback-card feedback-area ${result.correct?'correct':'wrong'}`; fb.textContent=result.correct?'Correct! Great model work.':`Not yet. Correct answer: ${result.correctAnswer}.`;}
 function updateQuestionNext(section){const next=section.querySelector('#next'); if(next)next.disabled=!SkillWorldRenderer.canAdvance(state,p);}
 function activeDrillLevel(){return SkillWorldRenderer.activeLevel(p,state);}
 function activeDrillQuestion(){return SkillWorldRenderer.activeLevelQuestion(p,state);}
	 function drillFeedback(section,result){const fb=section.querySelector('.drill-feedback'); if(!fb)return; fb.className=`feedback-card feedback-area drill-feedback ${result.correct?'correct':'wrong'}`; fb.textContent=result.correct?'Correct! You are building mastery.':`Not yet. Correct answer: ${result.correctAnswer}.`; const next=section.querySelector('#drill-next'); if(next)next.disabled=false;}
	 function sequenceValues(control){return [...control.querySelectorAll('[data-sequence-item]')].map((item)=>item.dataset.value);}
	 function refreshSequence(control,focusIndex){const items=[...control.querySelectorAll('[data-sequence-item]')]; items.forEach((item,index)=>{item.querySelector('.sequence-position').textContent=index+1; item.querySelector('.sequence-move-up').disabled=index===0; item.querySelector('.sequence-move-down').disabled=index===items.length-1; item.setAttribute('aria-label',`Position ${index+1} of ${items.length}: ${item.dataset.value}`);}); if(Number.isInteger(focusIndex))items[focusIndex]?.querySelector(focusIndex===0?'.sequence-move-down':'.sequence-move-up')?.focus();}
	 function moveSequence(button,direction){const item=button.closest('[data-sequence-item]'); const list=item.parentElement; const items=[...list.children]; const index=items.indexOf(item); const next=index+direction; if(next<0||next>=items.length)return; if(direction<0)list.insertBefore(item,items[next]); else list.insertBefore(items[next],item); refreshSequence(button.closest('[data-sequence-order]'),next);}

 function audioFallback(button){return button.closest('.audio-support')?.querySelector('[data-audio-fallback],.audio-unavailable-message');}
 function hideAudioUnavailable(button){const msg=audioFallback(button); if(msg){msg.classList.add('is-hidden'); msg.setAttribute('hidden','');}}
 function showAudioUnavailable(button){const msg=audioFallback(button); if(msg){msg.classList.remove('is-hidden'); msg.removeAttribute('hidden'); msg.textContent='Audio is not available on this device. Ask your teacher or grown-up to read this aloud.';} }
 const childFriendlySpeechConfig={lang:'en-US',rate:0.86,pitch:1,volume:1,initialPauseMs:140,repeatPauseMs:220};
 let activeSavedAudio=null;
 function promptAfterAudio(button){const support=button.closest('.audio-support'); const prompt=button.dataset.studentPrompt||''; const promptEl=support?.querySelector('.student-audio-prompt'); if(promptEl&&prompt)promptEl.textContent=prompt;}
 function playSavedAudioOnce(button,url){return new Promise((resolve,reject)=>{try{const audio=new Audio(url); activeSavedAudio=audio; audio.preload='auto'; audio.onended=()=>resolve(); audio.onerror=()=>reject(new Error('saved_audio_failed')); const played=audio.play(); if(played&&typeof played.catch==='function')played.catch(reject);}catch(err){reject(err);}});}
 async function playSavedAudio(button){const url=button.dataset.audioUrl||''; if(!url)return false; const repeat=Math.max(1,Number(button.dataset.audioRepeat||1)||1); try{if(activeSavedAudio){activeSavedAudio.pause(); activeSavedAudio=null;} if(window.speechSynthesis)window.speechSynthesis.cancel(); for(let i=0;i<repeat;i+=1){await playSavedAudioOnce(button,url); if(i<repeat-1)await new Promise((resolve)=>setTimeout(resolve,childFriendlySpeechConfig.repeatPauseMs));} promptAfterAudio(button); return true;}catch(err){return false;}}
 async function fetchGeneratedAudio(button){const text=button.dataset.audioText||''; if(!text)return ''; try{const response=await fetch('/api/skill-world/audio',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({text,voice:button.dataset.audioVoice||'alloy',format:button.dataset.audioFormat||'mp3',speed:Number(button.dataset.audioSpeed||0.9),pitch:Number(button.dataset.audioPitch||0),cache_key:button.dataset.audioCacheKey||''})}); if(!response.ok)return ''; const payload=await response.json(); const audioUrl=payload&&payload.audio_url?String(payload.audio_url):''; if(audioUrl){button.dataset.audioUrl=audioUrl;} return audioUrl;}catch(err){return '';}}
 function speakWithBrowserSpeech(button){const text=button.dataset.audioText||''; const repeat=Math.max(1,Number(button.dataset.audioRepeat||1)||1); if(!text)return; const canSpeak=typeof window!=='undefined'&&'speechSynthesis' in window&&typeof window.SpeechSynthesisUtterance!=='undefined'; if(!canSpeak){showAudioUnavailable(button); return;} let failed=false; const failOnce=()=>{if(!failed){failed=true; showAudioUnavailable(button);}}; const speakOne=(index)=>{const utterance=new window.SpeechSynthesisUtterance(text); utterance.lang=childFriendlySpeechConfig.lang; utterance.rate=childFriendlySpeechConfig.rate; utterance.pitch=childFriendlySpeechConfig.pitch; utterance.volume=childFriendlySpeechConfig.volume; utterance.onerror=failOnce; utterance.onend=()=>{if(failed)return; if(index+1<repeat){setTimeout(()=>speakOne(index+1),childFriendlySpeechConfig.repeatPauseMs);}else{promptAfterAudio(button);}}; setTimeout(()=>{try{window.speechSynthesis.speak(utterance);}catch(err){failOnce();}},index===0?childFriendlySpeechConfig.initialPauseMs:0);}; try{if(activeSavedAudio){activeSavedAudio.pause(); activeSavedAudio=null;} window.speechSynthesis.cancel(); speakOne(0);}catch(err){failOnce();} }
 async function speakAudio(button){hideAudioUnavailable(button); const prefersBrowser=button.dataset.audioPlaybackPreference==='browser_speech_first'; if(!prefersBrowser){if(button.dataset.audioUrl){const played=await playSavedAudio(button); if(played)return;} const generatedUrl=await fetchGeneratedAudio(button); if(generatedUrl){const played=await playSavedAudio(button); if(played)return;}} speakWithBrowserSpeech(button);}

 function skillWorldLaunchContext(){const params=new URLSearchParams(window.location.search);const allowed=['child_id','child_display_name','program_context','source_registry','return_url','tenant'];const ctx={};allowed.forEach((key)=>{const value=(params.get(key)||'').trim();if(value)ctx[key]=value;});return ctx;}
 function contextQuery(ctx){const params=new URLSearchParams();['program_context','source_registry','tenant'].forEach((key)=>{if(ctx[key])params.set(key,ctx[key]);});const query=params.toString();return query?`?${query}`:'';}
 async function resolveSkillWorldLearner(){const browserCtx=window.__GATES_GAME_CONTEXT__||window.__GAME_RUNTIME_CONTEXT__||{};const launchCtx=skillWorldLaunchContext();const ctx={...browserCtx,...launchCtx};if(ctx.profile_id||ctx.child_id)return {...ctx,child_id:String(ctx.child_id||ctx.profile_id)};if(ctx.program_context==='youth_development'||ctx.source_registry==='youth_development')return {...ctx,child_id:''};try{const res=await fetch('/api/gates/canonical-learners',{credentials:'same-origin'});if(!res.ok)return {child_id:''};const data=await res.json();const children=Array.isArray(data.children)?data.children:[];const selectedId=String(data.selected_child_id||'');const selected=(selectedId&&children.find(c=>String(c.child_id)===selectedId))||(children.length===1?children[0]:null);return selected?{...ctx,child_id:String(selected.child_id),child_display_name:selected.child_name||'Learner'}:{...ctx,child_id:''};}catch(_){return {...ctx,child_id:''};}}
 async function loadPersistedSkillWorld(state,skillId,ctx){if(!ctx.child_id)return;try{const res=await fetch(`/api/skill-world/progress/${encodeURIComponent(ctx.child_id)}/${encodeURIComponent(skillId)}${contextQuery(ctx)}`,{credentials:'same-origin'});if(!res.ok)return;const data=await res.json();const snap=data.progress&&data.progress.state_snapshot;if(snap&&typeof snap==='object'){Object.assign(state,snap); if(drillPath)state.mode='drill';}}catch(_){}}
 function progressPercent(){const total=8; if(state.mode==='drill'){const d=state.drill||{}; return Math.max(0,Math.min(99,Number(d.completedLevels?.length||0)*25));} return Math.max(0,Math.min(100,Math.round(((Number(state.stepIndex||0)+1)/total)*100)));}
 function savePersistedSkillWorld(status){if(!learnerCtx.child_id)return;const attempts=Number(state.attempts||0);const correct=Number(state.correct||0);const score=attempts?Math.round((correct/attempts)*100):0;fetch('/api/skill-world/progress',{method:'POST',credentials:'same-origin',headers:{'content-type':'application/json'},body:JSON.stringify({program_context:learnerCtx.program_context||'',source_registry:learnerCtx.source_registry||'',tenant:learnerCtx.tenant||'',email:learnerCtx.parent_email||learnerCtx.email||'',return_url:learnerCtx.return_url||'',child_id:learnerCtx.child_id,skill_id:id,mode:state.mode||'mission',status:status||((progressPercent()>=100)?'completed':'in_progress'),progress_percent:progressPercent(),attempts,correct,score_percent:score,hints_used:Number(state.hintsUsed||0),last_step:String(state.stepIndex||''),profile:state.profile||{},state_snapshot:state})}).catch(()=>{});}
 render();
	 app.addEventListener('click',(e)=>{
   const listen=e.target.closest('.audio-listen-button,.question-read-button,.page-read-button');
   if(listen){speakAudio(listen); return;}
   const step=e.target.closest('.mission-step');
   if(step){const requested=Number(step.dataset.stepIndex); if(requested<=state.stepIndex){state.mode='mission'; state.stepIndex=requested; render();} return;}
   const practice=e.target.closest('.continue-skill-practice');
   if(practice){e.preventDefault(); state.mode='drill'; SkillWorldRenderer.backToDrillCenter(state); render(); return;}
	   const startLevel=e.target.closest('.start-level');
	   if(startLevel){SkillWorldRenderer.selectLevel(state,Number(startLevel.dataset.levelIndex)); render(); return;}
	   const drillHint=e.target.closest('#drill-hint');
	   if(drillHint){SkillWorldRenderer.useHint(state); const fb=drillHint.closest('.drill-question-card').querySelector('.drill-feedback'); fb.textContent=drillHint.nextElementSibling.textContent; return;}
	   const drillShow=e.target.closest('#drill-show');
	   if(drillShow){const section=drillShow.closest('section'); const r=SkillWorldRenderer.showLevelAnswer(state,activeDrillLevel(),activeDrillQuestion()); drillFeedback(section,r); savePersistedSkillWorld(); return;}
		   const sequenceMove=e.target.closest('.sequence-move-up,.sequence-move-down');
		   if(sequenceMove){moveSequence(sequenceMove,sequenceMove.classList.contains('sequence-move-up')?-1:1); return;}
		   const sequenceRetry=e.target.closest('.sequence-retry');
		   if(sequenceRetry){const control=sequenceRetry.closest('[data-sequence-order]'); const section=sequenceRetry.closest('section'); if(sequenceRetry.classList.contains('drill-ans')){SkillWorldRenderer.retryLevelAnswer(state,activeDrillLevel(),activeDrillQuestion()); const next=section.querySelector('#drill-next'); if(next)next.disabled=true; const feedback=section.querySelector('.drill-feedback'); if(feedback){feedback.className='feedback-card feedback-area drill-feedback';feedback.textContent='Adjust the events, then submit the complete order again.';}}else{const {zone,q}=activeQuestion(section); SkillWorldRenderer.retryAnswer(state,zone,q); const next=section.querySelector('#next');if(next)next.disabled=true;} const reset=control.querySelector('.sequence-reset'); if(reset)reset.click(); return;}
		   const sequenceReset=e.target.closest('.sequence-reset');
		   if(sequenceReset){const control=sequenceReset.closest('[data-sequence-order]'); const question=control.closest('.drill-question-card')?activeDrillQuestion():activeQuestion(control.closest('.screen')).q; const list=control.querySelector('.sequence-list'); (question.sequence_items||[]).forEach((value)=>list.append([...list.children].find((item)=>item.dataset.value===value))); refreshSequence(control,0); return;}
		   const sequenceSubmit=e.target.closest('.sequence-submit');
		   if(sequenceSubmit){const control=sequenceSubmit.closest('[data-sequence-order]'); const section=sequenceSubmit.closest('section'); const answer=sequenceValues(control); if(sequenceSubmit.classList.contains('drill-ans')){const r=SkillWorldRenderer.submitLevelAnswer(state,activeDrillLevel(),activeDrillQuestion(),answer); drillFeedback(section,r);}else{const {zone,q}=activeQuestion(section); const r=SkillWorldRenderer.submitAnswer(state,zone,q,answer); answerFeedback(section,r); updateQuestionNext(section);} savePersistedSkillWorld(); return;}
		   const drillAns=e.target.closest('.drill-ans');
	   if(drillAns){const section=drillAns.closest('section'); const r=SkillWorldRenderer.submitLevelAnswer(state,activeDrillLevel(),activeDrillQuestion(),drillAns.dataset.val); drillFeedback(section,r); savePersistedSkillWorld(); return;}
	   const drillSubmit=e.target.closest('#drill-submit');
	   if(drillSubmit){const section=drillSubmit.closest('section'); const r=SkillWorldRenderer.submitLevelAnswer(state,activeDrillLevel(),activeDrillQuestion(),section.querySelector('#drill-short').value); drillFeedback(section,r); savePersistedSkillWorld(); return;}
	   const drillNext=e.target.closest('#drill-next');
	   if(drillNext){SkillWorldRenderer.advanceLevelQuestion(state,activeDrillLevel()); state.profile=SkillWorldRenderer.finalize(state,p,learnerCtx.child_id||'local-learner'); savePersistedSkillWorld(state.drill?.view==='complete'?'completed':'in_progress'); render(); return;}
	   const playAgain=e.target.closest('.play-level-again');
	   if(playAgain){SkillWorldRenderer.playLevelAgain(state,activeDrillLevel()); render(); return;}
	   const nextLevel=e.target.closest('.next-level');
	   if(nextLevel){SkillWorldRenderer.nextLevel(state,p); render(); return;}
	   const backDrill=e.target.closest('.back-to-drill-center');
	   if(backDrill){SkillWorldRenderer.backToDrillCenter(state); render(); return;}
   const hint=e.target.closest('#hint');
   if(hint){SkillWorldRenderer.useHint(state); const fb=hint.closest('.question-card').querySelector('.feedback-area'); fb.textContent=hint.nextElementSibling.textContent; const statTemp=document.createElement('div'); statTemp.innerHTML=SkillWorldRenderer.renderStats(state,p); app.querySelector('.sw-stats').innerHTML=statTemp.querySelector('.sw-stats').innerHTML; return;}
   const show=e.target.closest('#show');
   if(show){const section=show.closest('.screen'); const {zone,q}=activeQuestion(section); const r=SkillWorldRenderer.showAnswerAndContinue(state,zone,q); const fb=section.querySelector('.feedback-area'); fb.className='feedback-card feedback-area wrong'; fb.textContent=`Answer: ${r.correctAnswer}. Press Next when you are ready!`; updateQuestionNext(section); return;}
   const ans=e.target.closest('.ans');
   if(ans){const section=ans.closest('.screen'); const {zone,q}=activeQuestion(section); const r=SkillWorldRenderer.submitAnswer(state,zone,q,ans.dataset.val); answerFeedback(section,r); updateQuestionNext(section); savePersistedSkillWorld(); return;}
   const submit=e.target.closest('#submit');
   if(submit){const section=submit.closest('.screen'); const {zone,q}=activeQuestion(section); const r=SkillWorldRenderer.submitAnswer(state,zone,q,section.querySelector('#short').value); answerFeedback(section,r); updateQuestionNext(section); savePersistedSkillWorld(); return;}
   const replay=e.target.closest('.replay-mission');
   if(replay){Object.assign(state,SkillWorldRenderer.createState()); state.mode='mission'; render(); return;}
   const next=e.target.closest('.mission-next');
   if(next){if(next.classList.contains('save-growth')){state.profile=SkillWorldRenderer.finalize(state,p,learnerCtx.child_id||'local-learner'); savePersistedSkillWorld('completed');}
     if(SkillWorldRenderer.advanceMission(state,p)){state.mode='mission'; savePersistedSkillWorld(); render();}
   }
	 });
	 app.addEventListener('keydown',(e)=>{const item=e.target.closest('[data-sequence-item]'); if(!item||!e.altKey||!['ArrowUp','ArrowDown'].includes(e.key))return; e.preventDefault(); moveSequence(e.target.closest('button')||item.querySelector('.sequence-move-up'),e.key==='ArrowUp'?-1:1);});
 }catch(err){app.innerHTML=`<main class="skill-world-shell"><section class="central-screen-card developer-error"><h1>Skill World package error</h1><p>${String(err.message||err)}</p><p>This generator fails closed instead of rendering a plain quiz.</p></section></main>`; console.error(err);}
})();
</script></body></html>
