<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width, initial-scale=1'><title>Skill World Generator</title></head><body>
<div id='app'></div>
<script src='/gamehub/skill-world/engine/recommendation-helper.js'></script>
<script src='/gamehub/skill-world/engine/growth-data-adapter.js'></script>
<script src='/gamehub/skill-world/engine/skill-package-schema.js'></script>
<script src='/gamehub/skill-world/renderers/visual-model-registry.js'></script>
<script src='/gamehub/skill-world/screens/story-mission-screen.js'></script><script src='/gamehub/skill-world/screens/mini-lesson-screen.js'></script><script src='/gamehub/skill-world/screens/worked-example-screen.js'></script><script src='/gamehub/skill-world/screens/guided-demo-screen.js'></script><script src='/gamehub/skill-world/screens/question-zone-screen.js'></script><script src='/gamehub/skill-world/screens/checkpoint-screen.js'></script><script src='/gamehub/skill-world/screens/badge-screen.js'></script><script src='/gamehub/skill-world/screens/growth-profile-screen.js'></script>
<script src='/gamehub/skill-world/engine/skill-world-renderer.js'></script>
<script>
(async function(){const id=(location.pathname.split('/').pop()||'G1M_DP_001').toUpperCase();const p=await (await fetch(`/gamehub/skill-world/content/${id}.skill-package.v1.json`)).json();const state=SkillWorldRenderer.createState();const zones=[['guided',p.guided_practice||[]],['challenge',p.adaptive_question_bank||[]],['checkpoint',p.checkpoint||[]]];const flat=[];zones.forEach(([z,arr])=>arr.forEach((q)=>flat.push({zone:z,q})));let i=0;const app=document.getElementById('app');
function questionInput(q){if(q.question_type==='multiple_choice'){return `<div>${(q.options||[]).map((o,idx)=>`<button class='ans' data-val='${o}' id='opt-${idx}'>${o}</button>`).join('')}</div>`;}if(q.question_type==='short_response'){return `<input id='short' placeholder='Type your answer' /> <button id='submit'>Submit</button>`;}return `<button class='ans' data-val='${q.correct_answer||q.answer}'>Submit</button>`;}
function render(){if(i>=flat.length){const payload=SkillWorldRenderer.finalize(state,p,'demo-learner');app.innerHTML=SkillWorldBadgeScreen(state.stars)+SkillWorldGrowthProfileScreen(payload);return;}const item=flat[i],q=item.q;const qid=q.question_id||q.id||`q_${i+1}`;let lock=false;app.innerHTML=`<h3>${p.skill}</h3><p>${q.prompt}</p>${SkillWorldVisualRegistry.render(q)}${questionInput(q)}<div><button id='show'>Show Answer / Continue</button><button id='next' style='display:none'>Next</button></div><p id='fb'></p>`;
const fb=document.getElementById('fb');const next=document.getElementById('next');
function done(result,fromShow){fb.textContent=`${result.correct?'Correct':'Not quite'} — Answer: ${result.correctAnswer}`;next.style.display='inline-block';if(!result.correct&&!fromShow){fb.dataset.misconception=q.misconception_tag||'';}}
function submit(v){if(lock)return;lock=true;done(SkillWorldRenderer.submitAnswer(state,item.zone,q,v),false);}
app.querySelectorAll('.ans').forEach((b)=>{const handler=()=>{submit(b.dataset.val); app.querySelectorAll('.ans').forEach(x=>x.disabled=true); b.style.border='2px solid #f44'; if((b.dataset.val||'').toLowerCase().trim()===(q.correct_answer||q.answer||'').toLowerCase().trim()){b.style.border='2px solid #0a0';}}; b.addEventListener('click',handler); b.addEventListener('touchstart',(e)=>{e.preventDefault();handler();},{passive:false});});
const submitBtn=document.getElementById('submit'); if(submitBtn){submitBtn.addEventListener('click',()=>submit(document.getElementById('short').value));}
next.addEventListener('click',()=>{i++;render();}); document.getElementById('show').addEventListener('click',()=>{const r=SkillWorldRenderer.showAnswerAndContinue(state,item.zone,q);done(r,true);});}
render();})();
</script></body></html>
