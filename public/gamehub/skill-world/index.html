<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width, initial-scale=1'><title>Skill World Generator</title><link rel='stylesheet' href='/gamehub/skill-world/skill-world.css'></head><body>
<div id='app'><main class="skill-world-shell"><header class="skill-world-header"><h1>Skill World: Loading Mission</h1><p class="mission-subtitle">Preparing your full mission.</p></header></main></div>
<script src='/gamehub/skill-world/engine/recommendation-helper.js'></script>
<script src='/gamehub/skill-world/engine/growth-data-adapter.js'></script>
<script src='/gamehub/skill-world/engine/skill-package-schema.js'></script>
<script src='/gamehub/skill-world/renderers/visual-model-registry.js'></script>
<script src='/gamehub/skill-world/screens/story-mission-screen.js'></script><script src='/gamehub/skill-world/screens/mini-lesson-screen.js'></script><script src='/gamehub/skill-world/screens/worked-example-screen.js'></script><script src='/gamehub/skill-world/screens/guided-demo-screen.js'></script><script src='/gamehub/skill-world/screens/question-zone-screen.js'></script><script src='/gamehub/skill-world/screens/checkpoint-screen.js'></script><script src='/gamehub/skill-world/screens/badge-screen.js'></script><script src='/gamehub/skill-world/screens/growth-profile-screen.js'></script>
<script src='/gamehub/skill-world/engine/skill-world-renderer.js'></script>
<script>
(async function(){
 const id=(location.pathname.split('/').pop()||'G1M_DP_001').toUpperCase(); const app=document.getElementById('app');
 try{const p=await (await fetch(`/gamehub/skill-world/content/${id}.skill-package.v1.json`)).json(); const state=SkillWorldRenderer.createState(); const rendered=SkillWorldRenderer.renderSkillWorld(p,{state,failClosed:true}); app.innerHTML=rendered.html;
 function refreshChrome(){const shell=SkillWorldRenderer.renderSkillWorld(p,{state}).html; const temp=document.createElement('div'); temp.innerHTML=shell; app.querySelector('.mission-map').innerHTML=temp.querySelector('.mission-map').innerHTML; app.querySelector('.sw-stats').innerHTML=temp.querySelector('.sw-stats').innerHTML;}
 function activeQuestion(section){const zone=section.classList.contains('challenge-screen')?'challenge':section.classList.contains('checkpoint-screen')?'checkpoint':'practice'; const q=zone==='challenge'?(p.adaptive_question_bank||[])[0]:zone==='checkpoint'?(p.checkpoint||[])[0]:(p.guided_practice||[])[0]; return {zone,q};}
 app.addEventListener('click',(e)=>{const step=e.target.closest('.mission-step'); if(step){state.stepIndex=[...app.querySelectorAll('.mission-step')].indexOf(step); refreshChrome(); return;} const hint=e.target.closest('#hint'); if(hint){SkillWorldRenderer.useHint(state); const fb=hint.closest('.question-card').querySelector('.feedback-area'); fb.textContent=hint.nextElementSibling.textContent; refreshChrome(); return;} const show=e.target.closest('#show'); if(show){const section=show.closest('.screen'); const {zone,q}=activeQuestion(section); const r=SkillWorldRenderer.showAnswerAndContinue(state,zone,q); const fb=section.querySelector('.feedback-area'); fb.className='feedback-area wrong'; fb.textContent=`Answer: ${r.correctAnswer}. Continue when ready!`; refreshChrome(); return;} const ans=e.target.closest('.ans'); if(ans){const section=ans.closest('.screen'); const {zone,q}=activeQuestion(section); const r=SkillWorldRenderer.submitAnswer(state,zone,q,ans.dataset.val); const fb=section.querySelector('.feedback-area'); fb.className=`feedback-area ${r.correct?'correct':'wrong'}`; fb.textContent=r.correct?'Correct! Great model work.':`Not yet. Correct answer: ${r.correctAnswer}.`; refreshChrome(); return;} const submit=e.target.closest('#submit'); if(submit){const section=submit.closest('.screen'); const {zone,q}=activeQuestion(section); const r=SkillWorldRenderer.submitAnswer(state,zone,q,section.querySelector('#short').value); const fb=section.querySelector('.feedback-area'); fb.className=`feedback-area ${r.correct?'correct':'wrong'}`; fb.textContent=r.correct?'Correct! Great model work.':`Not yet. Correct answer: ${r.correctAnswer}.`; refreshChrome(); }});
 }catch(err){app.innerHTML=`<main class="skill-world-shell"><section class="central-screen-card developer-error"><h1>Skill World package error</h1><p>${String(err.message||err)}</p><p>This generator fails closed instead of rendering a plain quiz.</p></section></main>`; console.error(err);}
})();
</script></body></html>
