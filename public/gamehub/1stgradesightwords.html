<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sight Words – Match & Learn</title>
<style>
  body{
    font-family:"Comic Sans MS", Arial, sans-serif;
    background: linear-gradient(270deg,#0f2027,#203a43,#2c5364);
    background-size: 600% 600%;
    animation: bg 14s ease infinite;
    color:#e0f7fa;
    text-align:center;
    padding:18px;
  }
  @keyframes bg{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
  }

  h1,h2{ text-shadow:0 0 10px #00e5ff; margin: 10px 0; }

  .wrap{
    max-width: 980px;
    margin: 0 auto;
    display: grid;
    gap: 18px;
  }

  section{
    background: rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 16px;
  }

  .row{
    display:flex;
    gap:10px;
    justify-content:center;
    flex-wrap:wrap;
    align-items:center;
    margin: 10px 0;
  }

  button, select{
    font-size: 16px;
    padding: 10px 14px;
    border-radius: 10px;
    border: none;
  }
  button{
    background:#00e5ff;
    cursor:pointer;
  }

  /* MATCH GAME */
  #game{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
    gap: 12px;
    margin-top: 12px;
  }
  .card{
    background: rgba(0,229,255,0.22);
    border: 2px solid rgba(0,229,255,0.35);
    border-radius: 14px;
    padding: 18px 10px;
    font-size: 22px;
    font-weight: 700;
    color: transparent;
    cursor: pointer;
    user-select:none;
    box-shadow: 0 0 12px rgba(0,229,255,0.25);
    transition: transform .15s;
  }
  .card:hover{ transform: scale(1.03); }
  .card.revealed{
    background:#fff;
    color:#263238;
    cursor: default;
  }
  .card.matched{
    background:#00e676;
    color:#004d40;
    cursor: default;
  }

  /* LEARN ZONE */
  .learnBox{
    max-width: 820px;
    margin: 0 auto;
    text-align:left;
  }
  .label{
    font-size:14px;
    opacity: .9;
    margin-bottom: 6px;
  }
  .sentence{
    font-size: 24px;
    line-height: 1.25;
    margin: 10px 0 14px;
    text-align:center;
  }
  .target{
    display:inline-block;
    padding: 4px 10px;
    border-radius: 10px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.25);
    margin: 0 4px;
  }
  .blank{
    display:inline-block;
    min-width: 20px;
    border-bottom: 3px solid #00e5ff;
    text-align:center;
    font-weight: 900;
    padding: 0 4px;
  }
  .inputRow{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
    margin-top: 10px;
  }
  input{
    font-size: 20px;
    width: 70px;
    padding: 10px;
    border-radius: 10px;
    border: none;
    text-align:center;
  }
  .feedback{
    margin-top: 10px;
    font-size: 18px;
    text-align:center;
    min-height: 24px;
  }
  .ok{ color:#69f0ae; font-weight:700; }
  .no{ color:#ff8a80; font-weight:700; }

  .smallNote{
    font-size: 14px;
    opacity: .85;
    margin-top: 10px;
    text-align:center;
  }
</style>

  <style id="gamehub-shared-identity-style">
    .gamehub-shared-identity { display:flex; align-items:center; justify-content:space-between; gap:0.75rem; flex-wrap:wrap; margin: 0 0 0.75rem; padding: 0.55rem 0.75rem; border-radius: 10px; border: 1px solid rgba(148,163,184,0.45); background: rgba(15,23,42,0.16); }
    .gamehub-shared-badge { font-size: 0.78rem; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 700; opacity: 0.95; }
    .gamehub-practice-mode { font-size: 0.85rem; font-weight: 600; opacity: 0.92; }
    .gamehub-back-link { font-size: 0.85rem; font-weight: 700; text-decoration: none; border-bottom: 1px solid currentColor; }
  </style>

</head>
<body>

<div class="wrap">
  <h1>🚀 Sight Words – Match & Learn</h1>
  <p id="modeNotice">Practice mode: Standard</p>

  <!-- MATCH -->
  <section>
    <h2>🧩 Match the Words</h2>
    <div class="row">
      <label>
        Cards:
        <select id="matchSize">
          <option value="12">3×4 (12 cards)</option>
          <option value="16">4×4 (16 cards)</option>
          <option value="18">3×6 (18 cards)</option>
          <option value="24">4×6 (24 cards)</option>
        </select>
      </label>
      <button onclick="startMatch()">🔄 New Match</button>
    </div>
    <div id="game"></div>
  </section>

  <!-- LEARN -->
  <section>
    <h2>✏️ Learn the Words</h2>
    <div class="learnBox">
      <div class="label">Read the sentence. Type the missing letter.</div>
      <div id="learnSentence" class="sentence"></div>

      <div class="inputRow">
        <input id="letterInput" maxlength="1" placeholder="a"/>
        <button onclick="checkLetter()">Check</button>
        <button onclick="showWord()">Show Word</button>
        <button onclick="newLearn()">➡️ Next</button>
      </div>

      <div id="learnFeedback" class="feedback"></div>
      <div id="learnHint" class="smallNote"></div>
    </div>
  </section>
</div>

<script src="/gamehub/shared-content-loader.js"></script>
<script src="/gamehub/gamehub-session-adapter.js"></script>
<script>
/** =========================
 *  WORD BANK (your exact list)
 *  ========================= */
const WORDS_FALLBACK = [
  "these","while","one","once","begin","above",
  "don't","out","have","made","where","like","home",
  "there","name","use","think","almost","help","among",
  "could","since","love","open","place","would",
  "it","push","this","go","when","for","me","of","be",
  "talk","that","not","you","my","was","most","what","get",
  "will","find","pull","with","off","form"
];

/** =========================
 *  SENTENCES (logical + simple)
 *  Each word has 2 options.
 *  ========================= */
const SENT_FALLBACK = {
  "these": ["Put these on the table.", "I like these red shoes."],
  "while": ["I read while you cook.", "Wait here while I tie my shoe."],
  "one": ["I have one red ball.", "Pick one book to read."],
  "once": ["I went there once.", "Once I saw a big frog."],
  "begin": ["Begin when I say go.", "We begin our game now."],
  "above": ["The bird is above the tree.", "Look above the door."],
  "don't": ["Don't run in the hall.", "Don't touch the hot pan."],
  "out": ["Go out to play.", "The light is out."],
  "have": ["I have a new pencil.", "We have two cats."],
  "made": ["I made a paper boat.", "Mom made soup for us."],
  "where": ["Where is my hat?", "Where do you want to go?"],
  "like": ["I like to read.", "Do you like this song?"],
  "home": ["I walk home after school.", "My home is warm."],
  "there": ["Put it there, please.", "There is a dog."],
  "name": ["My name is Sam.", "Write your name here."],
  "use": ["Use a crayon, please.", "We use soap to wash."],
  "think": ["I think it will rain.", "Think before you speak."],
  "almost": ["I am almost done.", "The cup is almost full."],
  "help": ["Help me tie my shoe.", "I will help you read."],
  "among": ["Hide among the trees.", "The cat is among the boxes."],
  "could": ["I could jump high.", "We could play a game."],
  "since": ["I have been here since Monday.", "Since lunch, I feel full."],
  "love": ["I love my family.", "We love to laugh."],
  "open": ["Open the door, please.", "I open my book."],
  "place": ["Put it in its place.", "This is a nice place."],
  "would": ["I would like some water.", "He would help if he could."],
  "it": ["It is my turn.", "It is cold today."],
  "push": ["Push the door gently.", "Push the swing."],
  "this": ["This is my book.", "This is fun!"],
  "go": ["Go to the line.", "Ready, set, go!"],
  "when": ["When will we eat?", "Tell me when you are ready."],
  "for": ["This gift is for you.", "I made it for Mom."],
  "me": ["Come with me.", "That is for me."],
  "of": ["A cup of milk.", "The top of the hill."],
  "be": ["Be kind to others.", "Be quiet, please."],
  "talk": ["Talk in a soft voice.", "We talk after school."],
  "that": ["That is my chair.", "I want that one."],
  "not": ["Do not run.", "This is not mine."],
  "you": ["You can do it!", "I will help you."],
  "my": ["My dog is small.", "That is my pen."],
  "was": ["I was happy today.", "He was late."],
  "most": ["I like pizza most.", "Most birds can fly."],
  "what": ["What is your name?", "What do you see?"],
  "get": ["Get your coat.", "I get a snack."],
  "will": ["I will help you.", "We will go soon."],
  "find": ["Find the red crayon.", "I can find my shoes."],
  "pull": ["Pull the door open.", "Pull the wagon."],
  "with": ["I play with my friend.", "Read with me."],
  "off": ["Turn off the light.", "Take off your hat."],
  "form": ["Make a line in this form.", "The clay can form a ball."]
};


async function initializeSharedContent(){
  if(!window.GamehubSharedContent) return;
  const bank=await window.GamehubSharedContent.loadWordBank('/gamehub/content/word-bank.sample.json', null);
  if(!bank) return;
  const words=window.GamehubSharedContent.fromWordBankToSightWordsDeck(bank);
  if(words.length){ WORDS = Array.from(new Set(words.concat(WORDS_FALLBACK))); }
}
initializeSharedContent();

const GAME_KEY = "1stgradesightwords";
const ACTIVITY_KEYS = {
  match: "match_mode",
  learn: "learn_mode"
};
const GAME_RUNTIME_CONTEXT_FALLBACK={child_display_name:"Learner",child_age_band:null,profile_id:null,session_id:null,gate_context:null,practice_path:null,mode_preset:"standard"};
function normalizeModePreset(v){const c=typeof v==="string"?v.trim().toLowerCase():"";return c==="support"||c==="challenge"?c:"standard"}
function labelModePreset(v){const n=normalizeModePreset(v);return n.charAt(0).toUpperCase()+n.slice(1)}
function getLaunchContext(){const params=new URLSearchParams(window.location.search);const raw=window.__GATES_GAME_CONTEXT__||window.__GAME_RUNTIME_CONTEXT__||{};const merged={...GAME_RUNTIME_CONTEXT_FALLBACK,...raw};if(params.has("gate_context")) merged.gate_context=params.get("gate_context");if(params.has("practice_path")) merged.practice_path=params.get("practice_path");if(params.has("mode_preset")) merged.mode_preset=params.get("mode_preset");return {...merged,mode_preset:normalizeModePreset(merged.mode_preset)}}
const launchContext=getLaunchContext();
const sightWordsPresetConfig={support:{defaultMatchSize:"12",learnFraming:"Support mode uses a smaller card set and extra hint-first pacing."},standard:{defaultMatchSize:"16",learnFraming:"Standard mode balances matching and letter practice."},challenge:{defaultMatchSize:"24",learnFraming:"Challenge mode uses a bigger card set for longer rounds."}};
const appliedSightWordsPreset=sightWordsPresetConfig[launchContext.mode_preset]||sightWordsPresetConfig.standard;
let adapterSessionStarted = false;
let sessionStartMs = Date.now();
let activeActivityKey = ACTIVITY_KEYS.match;
let activeMode = "match";
let roundStartMs = Date.now();
let learnAttempted = false;
let learnHadMiss = false;

function getDurationBand(ms){
  if(ms < 15000) return "brief";
  if(ms < 45000) return "steady";
  return "extended";
}

function emitAdapterEvent(eventName, payload){
  if(!window.GamehubSessionAdapter || typeof window.GamehubSessionAdapter.emit !== "function") return;
  window.GamehubSessionAdapter.emit(eventName, payload);
}

function startAdapterSession(){
  if(adapterSessionStarted || !window.GamehubSessionAdapter) return;
  sessionStartMs = Date.now();
  adapterSessionStarted = true;
  if(typeof window.GamehubSessionAdapter.startSession === "function"){
    window.GamehubSessionAdapter.startSession({
      game_key: GAME_KEY,
      activity_key: activeActivityKey,
      mode: activeMode
    });
  }
  emitAdapterEvent("game_session_started", {
    game_key: GAME_KEY,
    activity_key: activeActivityKey,
    mode: activeMode
  });
}

function switchActivity(activityKey, mode){
  activeActivityKey = activityKey;
  activeMode = mode;
  emitAdapterEvent("activity_selected", {
    game_key: GAME_KEY,
    activity_key: activeActivityKey,
    mode: activeMode
  });
}

function startRound(){
  roundStartMs = Date.now();
  emitAdapterEvent("round_started", {
    game_key: GAME_KEY,
    activity_key: activeActivityKey,
    mode: activeMode
  });
}

function markRoundCompleted(success, persistenceBand){
  emitAdapterEvent("round_completed", {
    game_key: GAME_KEY,
    activity_key: activeActivityKey,
    mode: activeMode,
    success,
    duration_band: getDurationBand(Date.now() - roundStartMs),
    persistence_band: persistenceBand
  });
}

/** =========================
 *  MATCH GAME
 *  ========================= */
let first=null, second=null, lock=false;

function shuffle(arr){ return arr.sort(()=>Math.random()-0.5); }

function startMatch(){
  startAdapterSession();
  switchActivity(ACTIVITY_KEYS.match, "match");
  startRound();
  const game = document.getElementById("game");
  game.innerHTML="";
  first=second=null; lock=false;

  const totalCards = parseInt(document.getElementById("matchSize").value, 10);
  const pairs = totalCards/2;

  const chosen = shuffle([...WORDS]).slice(0, pairs);
  const deck = shuffle([...chosen, ...chosen]);

  deck.forEach(word=>{
    const c = document.createElement("div");
    c.className="card";
    c.textContent=word;
    c.onclick=()=>flip(c);
    game.appendChild(c);
  });
}

function flip(card){
  if(lock || card.classList.contains("revealed")) return;
  card.classList.add("revealed");

  if(!first){ first=card; return; }
  second=card;

  if(first.textContent === second.textContent){
    first.classList.add("matched");
    second.classList.add("matched");
    first=second=null;
  } else {
    lock=true;
    setTimeout(()=>{
      first.classList.remove("revealed");
      second.classList.remove("revealed");
      first=second=null;
      lock=false;
    }, 850);
  }
}

/** =========================
 *  LEARN ZONE
 *  Exactly ONE missing letter in the target word only
 *  ========================= */
let currentWord = "";
let missingChar = "";
let missingIndex = -1;
let currentSentence = "";

function pickMissingIndex(word){
  // Don’t blank the apostrophe in "don't" (makes it confusing)
  const badIndexes = new Set();
  for(let i=0;i<word.length;i++){
    if(word[i]==="'") badIndexes.add(i);
  }
  // pick a letter index not apostrophe
  let tries=0;
  while(tries<20){
    const idx = Math.floor(Math.random()*word.length);
    if(!badIndexes.has(idx)) return idx;
    tries++;
  }
  // fallback: first non-apostrophe
  for(let i=0;i<word.length;i++) if(word[i] !== "'") return i;
  return 0;
}

function renderBlankedWord(word, idx){
  const before = word.slice(0, idx);
  const after  = word.slice(idx+1);
  return `${before}<span class="blank">_</span>${after}`;
}

function newLearn(){
  startAdapterSession();
  switchActivity(ACTIVITY_KEYS.learn, "learn");
  startRound();
  learnAttempted = false;
  learnHadMiss = false;
  // pick a word
  currentWord = WORDS[Math.floor(Math.random()*WORDS.length)];
  const options = SENT[currentWord] || [`I see ${currentWord}.`];
  currentSentence = options[Math.floor(Math.random()*options.length)];

  // pick one missing letter in the target word
  missingIndex = pickMissingIndex(currentWord);
  missingChar = currentWord[missingIndex].toLowerCase();

  // build sentence with the target word blanked
  const blanked = `<span class="target">${renderBlankedWord(currentWord, missingIndex)}</span>`;
  const sentenceWithBlank = currentSentence.replace(currentWord, blanked);

  document.getElementById("learnSentence").innerHTML = sentenceWithBlank;
  document.getElementById("letterInput").value = "";
  document.getElementById("learnFeedback").innerHTML = "";
  document.getElementById("learnHint").innerHTML =
    `Word: <b>${currentWord}</b> (type the missing letter)`;
  document.getElementById("letterInput").focus();
}

function checkLetter(){
  const input = (document.getElementById("letterInput").value || "").toLowerCase();
  const fb = document.getElementById("learnFeedback");

  if(!input){
    fb.innerHTML = `<span class="no">Type one letter.</span>`;
    return;
  }

  if(input === missingChar){
    const persistenceBand = learnHadMiss ? "retry_then_success" : "first_try_success";
    markRoundCompleted(true, persistenceBand);
    fb.innerHTML = `<span class="ok">✅ Correct!</span>`;
    // auto-next after a short pause (feels good for kids)
    setTimeout(newLearn, 650);
  } else {
    if(!learnAttempted){
      emitAdapterEvent("retry_started", {
        game_key: GAME_KEY,
        activity_key: activeActivityKey,
        mode: activeMode,
        event_category: "first_miss"
      });
    } else if(!learnHadMiss){
      emitAdapterEvent("recovery_after_miss", {
        game_key: GAME_KEY,
        activity_key: activeActivityKey,
        mode: activeMode,
        event_category: "continued_after_miss"
      });
    }
    learnAttempted = true;
    learnHadMiss = true;
    fb.innerHTML = `<span class="no">❌ Try again.</span>`;
  }
}

function showWord(){
  // reveal the full word as a gentle help
  const fb = document.getElementById("learnFeedback");
  fb.innerHTML = `Hint: the word is <span class="ok">${currentWord}</span>`;
  document.getElementById("letterInput").focus();
}

// Enter key checks
document.addEventListener("keydown", (e)=>{
  if(e.key === "Enter"){
    const active = document.activeElement;
    if(active && active.id === "letterInput") checkLetter();
  }
});

window.addEventListener("beforeunload", ()=>{
  if(!adapterSessionStarted) return;
  const summary = {
    game_key: GAME_KEY,
    activity_key: activeActivityKey,
    mode: activeMode,
    completion_state: "exit",
    duration_band: getDurationBand(Date.now() - sessionStartMs),
    persistence_band: learnHadMiss ? "attempted_recovery" : "steady_play"
  };
  emitAdapterEvent("game_session_ended", summary);
  if(window.GamehubSessionAdapter && typeof window.GamehubSessionAdapter.endSession === "function"){
    window.GamehubSessionAdapter.endSession(summary);
  }
});

// init
const modeNoticeEl=document.getElementById("modeNotice"); if(modeNoticeEl) modeNoticeEl.textContent=`Practice mode: ${labelModePreset(launchContext.mode_preset)}`;
const matchSizeEl=document.getElementById("matchSize"); if(matchSizeEl) matchSizeEl.value=appliedSightWordsPreset.defaultMatchSize;
const learnHintBoot=document.getElementById("learnHint"); if(learnHintBoot) learnHintBoot.textContent=appliedSightWordsPreset.learnFraming;
startMatch();
newLearn();
</script>

<script>
(function addGameHubSharedIdentity(){
  if (window.__gamehubSharedIdentityMounted) return;
  window.__gamehubSharedIdentityMounted = true;
  const body = document.body;
  if (!body) return;
  const host = document.createElement('div');
  host.className = 'gamehub-shared-identity';
  const params = new URLSearchParams(window.location.search || '');
  const mode = (params.get('mode_preset') || 'standard').toLowerCase();
  const modeLabel = mode.charAt(0).toUpperCase() + mode.slice(1);
  host.innerHTML = `
    <div class="gamehub-shared-badge">GameHub Practice</div>
    <div class="gamehub-practice-mode" aria-live="polite">Practice mode: ${modeLabel}</div>
    <a class="gamehub-back-link" href="/gamehub/index.html">Back to GameHub</a>
  `;
  body.insertBefore(host, body.firstChild);
})();
</script>

</body>
</html>
