<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adaptive Learning V2 Lesson Hub</title>
  <style>
    :root{color-scheme:dark;--bg:#0f172a;--panel:#111827;--card:#0b1220;--line:#334155;--muted:#94a3b8;--text:#e2e8f0;--primary:#38bdf8;--primary-bg:#0ea5e9;--primary-text:#082f49;--selected:#facc15;--selected-bg:#422006}
    *{box-sizing:border-box}
    body{font-family:Arial,sans-serif;background:var(--bg);color:var(--text);margin:0;padding:16px;line-height:1.45}
    main{max-width:960px;margin:0 auto}
    h1,h2,h3,p{overflow-wrap:anywhere}
    h1{font-size:clamp(2rem,8vw,3.25rem);margin:.2rem 0 .5rem}
    h2{font-size:1.35rem;margin:.1rem 0 .75rem}
    h3{font-size:1.05rem;margin:0 0 .35rem}
    p{margin:.25rem 0 .7rem}
    .panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px}
    .muted{color:var(--muted)}
    .hint{font-size:.95rem}
    .grade-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .subject-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:10px}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:44px;padding:10px 12px;border-radius:12px;text-decoration:none;border:1px solid #475569;color:var(--text);background:#1e293b;font:inherit;font-weight:700;text-align:center;cursor:pointer;touch-action:manipulation;white-space:normal}
    .btn.primary{background:var(--primary-bg);border-color:var(--primary);color:var(--primary-text)}
    .btn.assessment{display:flex;width:100%;font-size:1.05rem;padding:14px 16px;margin-top:10px}
    .btn[aria-pressed="true"]{background:var(--selected-bg);border-color:var(--selected);color:#fef3c7;box-shadow:0 0 0 2px rgba(250,204,21,.25) inset}
    .btn[aria-pressed="true"]::before{content:'✓';font-weight:900}
    .btn:focus-visible{outline:3px solid #f8fafc;outline-offset:3px;box-shadow:0 0 0 6px rgba(56,189,248,.35)}
    .hidden{display:none!important}
    .lesson-list{list-style:none;padding:0;margin:10px 0 0;display:grid;gap:10px}
    .lesson-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;min-width:0}
    .lesson-meta{font-size:.92rem;color:var(--muted);margin-bottom:10px}
    .lesson-actions{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-top:10px}
    .section-label{letter-spacing:.08em;text-transform:uppercase;font-size:.78rem;color:#bae6fd;font-weight:800;margin:0 0 .35rem}
    @media (max-width:360px){body{padding:12px}.grade-grid,.subject-grid,.lesson-actions{grid-template-columns:1fr}.panel{padding:14px}}
  </style>
</head>
<body>
  <main>
    <section class="panel intro" aria-labelledby="adaptiveTitle">
      <h1 id="adaptiveTitle">Adaptive Learning</h1>
      <p>Choose your learner’s grade, then choose a subject to see Adaptive V2 assessment and lesson options.</p><p id="learnerContextNotice" class="muted"></p>
    </section>

    <section class="panel" aria-labelledby="gradeSelectTitle">
      <h2 id="gradeSelectTitle">Select Grade</h2>
      <p class="muted hint">No lessons, practice skills, or assessments appear until a grade and subject are selected.</p>
      <div class="grade-grid" id="gradeGrid" role="group" aria-label="Select grade"></div>
    </section>

    <div id="hubMount" aria-live="polite"></div>
  </main>
  <script>
    const grades=[1,2,3,4,5,6];
    const subjects=['Math','English'];
    const skillWorldManifestUrl='/gamehub/skill-world/content/manifest.json';
    const launchParams=new URLSearchParams(window.location.search);
    const routeContext={program_context:(launchParams.get('program_context')||'').trim(),tenant:(launchParams.get('tenant')||'').trim(),email:(launchParams.get('email')||'').trim(),child_id:(launchParams.get('child_id')||'').trim(),child_display_name:(launchParams.get('child_name')||launchParams.get('child_display_name')||'Princess Nia').trim(),return_url:(launchParams.get('return_url')||'/youth-development/parent-dashboard').trim()};
    if(routeContext.program_context==='youth_development'&&routeContext.child_id){window.__GAME_RUNTIME_CONTEXT__={program_context:'youth_development',source_registry:'youth_development_assessment_submissions',child_id:routeContext.child_id,profile_id:routeContext.child_id,child_display_name:routeContext.child_display_name,tenant:routeContext.tenant,parent_email:routeContext.email,return_url:routeContext.return_url,ownership_verified:true};}
    const state={grade:null,subject:null,packages:[],loaded:false};
    const gradeGrid=document.getElementById('gradeGrid');
    const hubMount=document.getElementById('hubMount');

    function escapeHtml(value){
      return String(value ?? '').replace(/[&<>"']/g,(char)=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));
    }
    function withRouteContext(path){const url=new URL(path,window.location.origin);['program_context','tenant','email','child_id','return_url'].forEach(k=>{if(routeContext[k])url.searchParams.set(k,routeContext[k]);});if(routeContext.child_display_name)url.searchParams.set('child_display_name',routeContext.child_display_name);return url.pathname+url.search;}
    function skillWorldHref(packageId){ return withRouteContext(`/skill-world/${encodeURIComponent(packageId)}`); }
    function skillWorldDrillHref(packageId){ return withRouteContext(`/skill-world/${encodeURIComponent(packageId)}/drill`); }
    function assessmentHref(grade,subject){ return withRouteContext(`/assessment-mvp?grade=${encodeURIComponent(String(grade))}&subject=${encodeURIComponent(subject)}`); }
    function getLaunchContext(){
      const params=new URLSearchParams(window.location.search);
      return {
        childId:(params.get('child_id')||'').trim()||'demo_child',
        sessionId:(params.get('sessionId')||'').trim()||'demo_session'
      };
    }
    function buildSignalPathUrl(){
      const {childId,sessionId}=getLaunchContext();
      return `/gamehub/content/index.html?child_id=${encodeURIComponent(childId)}&sessionId=${encodeURIComponent(sessionId)}&gradeBand=grades_1_3`;
    }
    async function loadSkillWorldPackages(){
      try{
        const manifest=await (await fetch(skillWorldManifestUrl)).json();
        const packageFiles=Array.isArray(manifest.packages)?manifest.packages:[];
        const packages=await Promise.all(packageFiles.map(async(file)=>{
          const pkg=await (await fetch(`/gamehub/skill-world/content/${file}`)).json();
          return {
            packageId:pkg.skill_id,
            grade:Number(pkg.grade),
            subject:pkg.subject,
            domain:pkg.domain,
            title:pkg.skill,
            hasDrill:Array.isArray(pkg.level_banks)&&pkg.level_banks.length>0
          };
        }));
        state.packages=packages.filter((pkg)=>pkg.packageId&&Number.isInteger(pkg.grade)&&subjects.includes(pkg.subject));
      }catch(err){
        console.error('Unable to load Skill World package manifest',err);
        state.packages=[];
      }finally{
        state.loaded=true;
        renderLearningPanel();
      }
    }
    function selectedPackages(){
      if(!state.grade||!state.subject) return [];
      return state.packages.filter((pkg)=>pkg.grade===state.grade&&pkg.subject===state.subject);
    }
    function renderLessonCard(pkg){
      const description=[`Grade ${pkg.grade}`,pkg.subject,pkg.domain].filter(Boolean).join(' · ');
      return `<li class="lesson-card"><h3>${escapeHtml(pkg.title)}</h3><p class="lesson-meta">${escapeHtml(description)}</p><div class="lesson-actions"><a class="btn primary" href="${escapeHtml(skillWorldHref(pkg.packageId))}">Start Lesson</a><a class="btn" href="${escapeHtml(skillWorldDrillHref(pkg.packageId))}">Practice This Skill</a></div></li>`;
    }
    function setPressed(container,attribute,value){
      container.querySelectorAll(`[${attribute}]`).forEach((btn)=>btn.setAttribute('aria-pressed',String(btn.dataset[attribute.replace('data-','')]===String(value))));
    }
    function renderSubjectPanel(){
      if(!state.grade){
        hubMount.innerHTML='';
        return;
      }
      const subjectButtons=subjects.map((subject)=>`<button class="btn" data-subject="${subject}" aria-pressed="${state.subject===subject}">${subject}</button>`).join('');
      const learningMarkup=state.subject?renderLearningMarkup():'';
      hubMount.innerHTML=`<section class="panel" id="subjectPanel" aria-labelledby="gradeTitle"><h2 id="gradeTitle">Grade ${state.grade} Learning Hub</h2><p class="muted hint">Select a subject to load the filtered curriculum packages.</p><div class="subject-grid" id="subjectGrid" role="group" aria-label="Select subject">${subjectButtons}</div></section>${learningMarkup}`;
      const subjectGrid=document.getElementById('subjectGrid');
      subjectGrid.querySelectorAll('[data-subject]').forEach((btn)=>btn.addEventListener('click',()=>{
        state.subject=btn.dataset.subject;
        setPressed(subjectGrid,'data-subject',state.subject);
        renderSubjectPanel();
      }));
      const launchSignalPathBtn=document.getElementById('launchSignalPath');
      if(launchSignalPathBtn) launchSignalPathBtn.addEventListener('click',()=>{ window.location.href=buildSignalPathUrl(); });
    }
    function renderLearningMarkup(){
      if(!state.grade||!state.subject) return '';
      const assessmentUrl=assessmentHref(state.grade,state.subject);
      const rows=selectedPackages().map(renderLessonCard).join('');
      const lessonsContent=state.loaded
        ? (rows||'<p class="muted">No manifest-listed packages are available for this grade and subject yet.</p>')
        : '<p class="muted">Loading filtered curriculum packages…</p>';
      const riteMarkup=routeContext.program_context==='youth_development'?'':`<section class="panel rite-adventures" id="otherAdventures" aria-labelledby="otherAdventuresTitle"><h2 id="otherAdventuresTitle">Other Learning Adventures</h2><div class="lesson-card"><h3>The Signal Path</h3><p class="lesson-meta">Rite of Passage Adventure · Gate 1 — Attention · Grades 1–3</p><p>Help Orin deliver a parcel, avoid distractions, catch Scatterbugs, and follow the glowing path.</p><button id="launchSignalPath" class="btn primary">Start Adventure</button></div></section>`;
      return `<section class="panel" id="learningPanel"><section aria-labelledby="assessmentTitle"><p class="section-label">Adaptive Assessment</p><h2 id="assessmentTitle">Adaptive Assessment</h2><p class="muted">Start only when your learner is ready. The assessment will not auto-start.</p><a class="btn primary assessment" href="${escapeHtml(assessmentUrl)}">Start Grade ${escapeHtml(state.grade)} ${escapeHtml(state.subject)} Adaptive Assessment</a></section><section aria-labelledby="lessonsTitle"><p class="section-label">Lessons</p><h2 id="lessonsTitle">Lessons</h2><ul class="lesson-list">${lessonsContent}</ul></section></section>${riteMarkup}`;
    }
    function renderLearningPanel(){
      if(state.grade) renderSubjectPanel();
    }
    function selectGrade(grade){
      state.grade=grade;
      state.subject=null;
      gradeGrid.querySelectorAll('[data-grade]').forEach((btn)=>btn.setAttribute('aria-pressed',String(Number(btn.dataset.grade)===grade)));
      renderSubjectPanel();
    }
    gradeGrid.innerHTML=grades.map((grade)=>`<button class="btn" data-grade="${grade}" aria-pressed="false">Grade ${grade}</button>`).join('');
    gradeGrid.querySelectorAll('[data-grade]').forEach((btn)=>btn.addEventListener('click',()=>selectGrade(Number(btn.dataset.grade))));
    const notice=document.getElementById("learnerContextNotice"); if(notice&&routeContext.program_context==="youth_development") notice.textContent=`Youth Development learner selected: ${routeContext.child_display_name||"Learner"}. Return path: ${routeContext.return_url}.`;
    loadSkillWorldPackages();
  </script>
</body>
</html>
