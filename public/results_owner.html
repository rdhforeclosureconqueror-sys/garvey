<!-- FILE: public/results_owner.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Owner Results</title>
  <style>
    body { font-family: Arial, sans-serif; background:#020617; color:#fff; margin:0; padding:24px; }
    .card { max-width:900px; margin:0 auto; background:#0f172a; border:1px solid #334155; border-radius:14px; padding:20px; }
    .btn { display:inline-block; margin:8px 8px 0 0; padding:10px 14px; border-radius:10px; background:gold; color:#000; text-decoration:none; font-weight:700; }
    .bar { margin:8px 0; }
    .track { background:#1e293b; border-radius:999px; overflow:hidden; height:10px; }
    .fill { background:#eab308; height:10px; }
    a { color: inherit; }
    .link { text-decoration: underline; }
    .result-id { margin:10px 0 16px; font-size:1.05rem; font-weight:700; color:#facc15; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Business Owner Results</h1>
    <p id="meta">Loading…</p>
    <p id="result-id" class="result-id" style="display:none;"></p>

    <div id="roles"></div>

    <h3>Percent Distribution</h3>
    <div id="bars"></div>

    <h3>Coaching</h3>
    <div id="guidance"></div>

    <div id="ctas"></div>
  </div>

  <script src="/js/api-contract.js"></script>
  <script>
    const qs = new URLSearchParams(window.location.search);
    const tenant = (qs.get("tenant") || "").trim();
    const email = (qs.get("email") || "").trim().toLowerCase();
    const cid = (qs.get("cid") || "").trim();
    const ridFromUrl = (qs.get("rid") || "").trim();
    const ownerRidStorageKey = tenant && email ? `garvey_owner_rid:${tenant}:${email}` : "";
    const ridFromStorage = ownerRidStorageKey ? (localStorage.getItem(ownerRidStorageKey) || "").trim() : "";
    let rid = ridFromUrl || ridFromStorage;

    const escapeHtml = (s) =>
      String(s || "").replace(/[&<>"']/g, (c) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[c]));

    function toSlug(s) {
      return String(s || "")
        .trim()
        .toLowerCase()
        .replace(/&/g, "and")
        .replace(/[^a-z0-9]+/g, "_")
        .replace(/^_+|_+$/g, "");
    }

    function buildOwnerArchetypeUrl(typeSlug, primarySlug, secondarySlug, growthSlug) {
      const params = new URLSearchParams();
      params.set("tenant", tenant);
      if (email) params.set("email", email);
      if (cid) params.set("cid", cid);
      if (rid) params.set("rid", rid);

      if (typeSlug) params.set("type", typeSlug);
      if (primarySlug) params.set("primary", primarySlug);
      if (secondarySlug) params.set("secondary", secondarySlug);
      if (growthSlug) params.set("growth", growthSlug);

      return `/owner_archetype.html?${params.toString()}`;
    }

    function buildDashboardUrl() {
      const params = new URLSearchParams({ tenant, email });
      if (cid) params.set("cid", cid);
      if (rid) params.set("rid", rid);
      return `/dashboard.html?${params.toString()}`;
    }

    function buildGarveyUrl() {
      const params = new URLSearchParams({ tenant });
      if (email) params.set("email", email);
      if (cid) params.set("cid", cid);
      if (rid) params.set("rid", rid);
      return `/garvey_premium.html?${params.toString()}`;
    }

    function buildResultsPermalink() {
      const params = new URLSearchParams({ tenant, email });
      if (cid) params.set("cid", cid);
      if (rid) params.set("rid", rid);
      return `/results_owner.html?${params.toString()}`;
    }

    function buildSiteUrl() {
      return `/t/${encodeURIComponent(tenant)}/site`;
    }

    async function load() {
      if (!tenant || !email) {
        document.getElementById("meta").textContent = "Missing tenant/email query params.";
        return;
      }

      const url = window.GarveyApi.buildUrl(
        `/api/results/${encodeURIComponent(email)}`,
        { type: "business_owner", tenant }
      );

      const res = await fetch(url);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Failed to load results");

      document.getElementById("meta").textContent = `Tenant: ${tenant} • Email: ${email}`;

      const apiRid = (data.result_id || data.result?.result_id || "").trim();
      rid = rid || apiRid;
      if (rid) {
        const ridEl = document.getElementById("result-id");
        ridEl.style.display = "";
        ridEl.textContent = `Result ID: ${rid}`;
        if (ownerRidStorageKey) localStorage.setItem(ownerRidStorageKey, rid);
      }

      const primaryRole = data.primary_role || "";
      const secondaryRole = data.secondary_role || "";
      const growthRole = data.weakness_role || "";

      const primarySlug = toSlug(primaryRole);
      const secondarySlug = toSlug(secondaryRole);
      const growthSlug = toSlug(growthRole);

      const primaryHref = buildOwnerArchetypeUrl(primarySlug, primarySlug, secondarySlug, growthSlug);
      const secondaryHref = buildOwnerArchetypeUrl(secondarySlug, primarySlug, secondarySlug, growthSlug);
      const growthHref = buildOwnerArchetypeUrl(growthSlug, primarySlug, secondarySlug, growthSlug);

      document.getElementById("roles").innerHTML = `
        <p><b>Primary:</b> <a class="link" href="${primaryHref}">${escapeHtml(primaryRole)}</a></p>
        <p><b>Secondary:</b> <a class="link" href="${secondaryHref}">${escapeHtml(secondaryRole)}</a></p>
        <p><b>Growth area:</b> <a class="link" href="${growthHref}">${escapeHtml(growthRole)}</a></p>
      `;

      const percents = data.percents || {};
      document.getElementById("bars").innerHTML = Object.entries(percents)
        .sort((a, b) => Number(b[1]) - Number(a[1]))
        .map(([k, v]) => {
          const typeSlug = toSlug(k);
          const href = buildOwnerArchetypeUrl(typeSlug, primarySlug, secondarySlug, growthSlug);
          return `
            <div class="bar">
              <div style="display:flex;justify-content:space-between;gap:10px;">
                <a class="link" href="${href}">${escapeHtml(k)}</a>
                <span>${Number(v)}%</span>
              </div>
              <div class="track"><div class="fill" style="width:${Number(v)}%"></div></div>
            </div>
          `;
        })
        .join("");

      const g = data.guidance || {};
      document.getElementById("guidance").innerHTML = `
        <p><b>Strengthen strength:</b> ${escapeHtml(g.strengthen_strength)}</p>
        <p><b>Support secondary:</b> ${escapeHtml(g.support_secondary)}</p>
        <p><b>Fix weakness:</b> ${escapeHtml(g.fix_weakness)}</p>
      `;

      document.getElementById("ctas").innerHTML = `
        <a class="btn" href="${buildDashboardUrl()}">Open My Dashboard</a>
        <a class="btn" href="${buildGarveyUrl()}">Start GARVEY Pathway</a>
        <a class="btn" href="${buildSiteUrl()}">View My Site</a>
        <a class="btn" href="${buildResultsPermalink()}">Copy/Bookmark Results Link</a>
      `;
    }

    load().catch((err) => {
      document.getElementById("meta").textContent = `Error: ${err.message}`;
    });
  </script>
</body>
</html>
