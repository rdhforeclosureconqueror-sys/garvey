<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GARVEY — Y (Yield)</title>
  <link rel="stylesheet" href="/garvey_ui.css">
  <script src="/garvey_ui.js" defer></script>
</head>
<body>
<header class="topbar"><div class="topbar-inner"><div class="brand">GARVEY • Y</div><button class="btn mobile-toggle" data-mobile-toggle type="button">Menu</button><nav class="nav-links"><a class="btn" data-tenant-href="/garvey_premium.html" href="#">Back to Premium</a><a class="btn" data-tenant-href="/garvey.html" href="#">Fallback Hub</a></nav></div></header>
<main class="wrap">
  <section class="card reveal"><div class="row"><span class="pill" data-tenant-label></span><a class="btn" data-tenant-href="/garvey_premium.html" href="#">Back</a></div><h1>Y — Yield</h1><p class="muted">Finalize and mark completion readiness.</p></section>
  <section class="card reveal"><h2>Final confirmations</h2><div class="grid grid-2"><button class="btn btn-ok" data-confirm="Ready for funding submission">✅ Ready for funding</button><button class="btn btn-ok" data-confirm="Pathway completed">✅ Pathway complete</button></div></section>
  <section class="kanban-wrap reveal"><div id="kanban"></div></section>
</main>
<script type="module">
import { ensureBoard, getBoard, getCards, createCard, moveCard, renderKanban } from "/garvey-kanban.js";
const phase = "Y";
const mount = document.getElementById("kanban");
const tenant = window.GARVEY_UI.requireTenant(mount);
let cached = { columns: [], cards: [] };
const doneId = () => {
  const cols = cached.columns.filter((c) => c.phase === phase);
  const done = cols.find((c) => String(c.name).toLowerCase() === "done");
  return done ? done.id : cols[cols.length - 1]?.id;
};
async function refresh() {
  await ensureBoard(tenant);
  const b = await getBoard(tenant);
  const c = await getCards(tenant, phase);
  cached = { columns: b.columns || [], cards: c.cards || [] };
  renderKanban({
    mount, tenant, phase,
    columns: cached.columns, cards: cached.cards,
    onCreate: async (payload) => { await createCard(payload); await refresh(); },
    onMove: async (id, to) => { await moveCard(id, to); await refresh(); },
  });
}
async function mark(title) {
  const col = doneId();
  if (!col) return;
  const existing = cached.cards.find((c) => String(c.title).trim().toLowerCase() === title.toLowerCase());
  if (!existing) await createCard({ tenant, phase, column_id: col, title, description: "Self-attested completion." });
  else if (existing.column_id !== col) await moveCard(existing.id, col);
  await refresh();
}
if (tenant) {
  document.querySelectorAll("[data-confirm]").forEach((btn) => btn.addEventListener("click", () => mark(btn.getAttribute("data-confirm") || "")));
  refresh();
}
</script>
</body>
</html>
