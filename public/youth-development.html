<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Youth Development Parent Intake</title>
</head>
<body>
  <p>Loading the parent intake walkthrough…</p>
  <script>
    (function () {
      const target = new URL("/youth-development/intake", window.location.origin);
      const current = new URL(window.location.href);
      current.searchParams.forEach((value, key) => target.searchParams.set(key, value));
      window.location.replace(target.pathname + target.search);
    }());
  </script>
</body>
</html>
