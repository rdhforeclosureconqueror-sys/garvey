<!-- FILE: public/intake.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Garvey Intake</title>

  <style>
    body { font-family: Arial, sans-serif; background:#000; color:#fff; text-align:center; padding:24px; }
    .card { background:#111; border:2px solid gold; padding:24px; border-radius:16px; max-width:760px; margin:0 auto; }
    h1 { color: gold; margin-top: 0; }
    .row { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin:10px 0 6px; }
    select, input {
      padding:10px; margin:8px 0; width:min(520px,92%);
      border-radius:10px; border:1px solid #334155; background:#0b1020; color:#fff;
    }
    .meta { color:#94a3b8; font-size:12px; margin-top:6px; }
    .err { color:#fca5a5; }
    .bar { height:10px; background:#222; border-radius:999px; overflow:hidden; margin-top:10px; }
    .bar > div { height:100%; width:0%; background:#22c55e; transition: width 120ms linear; }
    .btn {
      display:block; width:100%; padding:14px; margin:10px 0;
      border-radius:10px; border:2px solid #000; background:gold; color:#000;
      font-weight:700; cursor:pointer; text-align:left; line-height:1.25;
    }
    .btn:hover { background:#ef4444; color:#fff; }
    .btn:disabled { opacity:0.6; cursor:not-allowed; }
    pre { background:#0b1020; border:1px solid #334155; border-radius:10px; padding:12px; overflow:auto; text-align:left; }
    a { color:#93c5fd; } a:hover { color:#bfdbfe; }
  </style>
</head>

<body>
  <div class="card">
    <h1>Garvey Role Assessment</h1>

    <div class="row">
      <input id="email" placeholder="Email" value="test@email.com" />
      <select id="mode" title="Mode">
        <option value="25">Quick (25 Questions)</option>
        <option value="60">Deep (60 Questions)</option>
      </select>
    </div>

    <div class="row">
      <input id="tenant" placeholder="Tenant slug" value="test-business" />
    </div>

    <div class="meta" id="apiMeta"></div>
    <div class="meta" id="status"></div>

    <div class="meta" id="progressText">Loading…</div>
    <div class="bar"><div id="progressFill"></div></div>

    <div style="margin-top:14px; font-size:18px;" id="questionText"></div>
    <div id="optionsContainer"></div>

    <h3 style="color:#93c5fd; margin-top:18px;">Result</h3>
    <pre id="result">{}</pre>

    <div class="meta" style="margin-top:14px;">
      <a href="/dashboard.html">Dashboard</a> |
      <a href="/admin.html">Admin</a> |
      <a href="/voc.html">VOC</a> |
      <a href="/index.html">CX Engine</a>
    </div>
  </div>

  <script>
    const API_BASE = (() => {
      const host = window.location.hostname || "";
      if (host.includes("garveyfrontend")) return "https://garveybackend.onrender.com";
      return "";
    })();

    const SECTIONS = [
      { name: "Identity", tip: "How you naturally express yourself." },
      { name: "Decision Making", tip: "How you think under pressure." },
      { name: "Community Role", tip: "Your natural position in a system." },
      { name: "Execution", tip: "How you take action and build." }
    ];

    let questions = [];
    let answers = [];
    let currentIndex = 0;
    let sectionSize = 1;

    function qs(id) { return document.getElementById(id); }

    function setMeta() {
      qs("apiMeta").innerText = API_BASE ? `API: ${API_BASE}` : "API: same-origin";
      const params = new URLSearchParams(window.location.search);
      const t = (params.get("tenant") || "").trim();
      if (t) qs("tenant").value = t;
    }

    function setStatus(msg, isErr = false) {
      const el = qs("status");
      el.className = isErr ? "meta err" : "meta";
      el.innerText = msg || "";
    }

    async function readJsonOrText(res) {
      const ct = (res.headers.get("content-type") || "").toLowerCase();
      if (ct.includes("application/json")) return await res.json();
      return await res.text();
    }

    function setProgress() {
      const total = Math.max(questions.length, 1);
      const pct = Math.round((currentIndex / total) * 100);
      qs("progressFill").style.width = `${pct}%`;
      qs("progressText").innerText = questions.length
        ? `Question ${Math.min(currentIndex + 1, questions.length)} of ${questions.length} (${pct}%)`
        : "Loading…";
    }

    function getSection(index) {
      const safe = Math.max(sectionSize, 1);
      const idx = Math.min(Math.floor(index / safe), SECTIONS.length - 1);
      return SECTIONS[idx];
    }

    async function loadQuestions() {
      try {
        setStatus("Loading…");
        qs("result").innerText = "{}";

        answers = [];
        currentIndex = 0;

        const mode = qs("mode").value;
        const res = await fetch(`${API_BASE}/api/questions?mode=${encodeURIComponent(mode)}`);
        const data = await readJsonOrText(res);

        if (!res.ok) {
          const msg = typeof data === "string" ? data : (data?.error || "Failed to load questions");
          throw new Error(msg);
        }

        questions = Array.isArray(data.questions) ? data.questions : [];
        if (!questions.length) throw new Error("No questions returned");

        sectionSize = Math.max(1, Math.floor(questions.length / SECTIONS.length));
        showQuestion();
        setStatus("OK");
      } catch (err) {
        console.error(err);
        qs("questionText").innerText = "❌ Failed to load questions";
        qs("optionsContainer").innerHTML = "";
        setProgress();
        setStatus(err.message, true);
      }
    }

    function showQuestion() {
      setProgress();

      const q = questions[currentIndex];
      if (!q) return submitAssessment();

      const section = getSection(currentIndex);
      qs("questionText").innerText = q.question || "(missing question text)";

      const container = qs("optionsContainer");
      container.innerHTML = "";

      const options = [
        ["A", q.option_a],
        ["B", q.option_b],
        ["C", q.option_c],
        ["D", q.option_d]
      ];

      for (const [key, value] of options) {
        const btn = document.createElement("button");
        btn.className = "btn";
        btn.innerText = `${key}: ${value || ""}`;
        btn.disabled = !value;
        btn.onclick = () => handleAnswer(q.qid, key, section);
        container.appendChild(btn);
      }

      setStatus(`Section: ${section.name} — ${section.tip}`);
    }

    function handleAnswer(qid, option, section) {
      answers.push({ qid, answer: option });
      currentIndex += 1;

      if (sectionSize && currentIndex % sectionSize === 0 && currentIndex < questions.length) {
        alert(`✅ Section complete: ${section.name}`);
      }

      showQuestion();
    }

    async function submitAssessment() {
      const email = (qs("email").value || "").trim();
      const tenant = (qs("tenant").value || "").trim();

      if (!email) return setStatus("Email is required.", true);
      if (!tenant) return setStatus("Tenant slug is required.", true);

      try {
        setStatus("Submitting…");
        qs("questionText").innerText = "Submitting…";
        qs("optionsContainer").innerHTML = "";

        const res = await fetch(`${API_BASE}/api/intake`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, tenant, answers })
        });

        const data = await readJsonOrText(res);

        if (!res.ok) {
          const msg = typeof data === "string" ? data : (data?.error || "Submit failed");
          throw new Error(msg);
        }

        qs("questionText").innerText = "🎯 Your Results";
        qs("result").innerText = JSON.stringify(data, null, 2);
        setStatus("Submitted.");
      } catch (err) {
        console.error(err);
        qs("questionText").innerText = "❌ Submission failed";
        setStatus(err.message, true);
      }
    }

    qs("mode").addEventListener("change", loadQuestions);

    setMeta();
    loadQuestions();
  </script>
</body>
</html>
