<script>
"use strict";

// ================================
// API BASE (AUTO DETECT)
// ================================

const API_BASE = (() => {
  const host = window.location.hostname || "";
  if (host.includes("garveyfrontend")) {
    return "https://garveybackend.onrender.com";
  }
  return "";
})();

// ================================
// STATE
// ================================

let questions = [];
let currentIndex = 0;
let answers = [];

// ================================
// HELPERS (🔥 NEW CORE FIX)
// ================================

function safeParse(val) {
  try {
    return JSON.parse(val || "[]");
  } catch {
    return [];
  }
}

function normalizeQuestions(rawQuestions = []) {
  return rawQuestions.map(q => ({
    id: q.qid,
    text: q.question_text,
    options: [
      { key: "A", text: q.option_a, maps: safeParse(q.mapping_a) },
      { key: "B", text: q.option_b, maps: safeParse(q.mapping_b) },
      { key: "C", text: q.option_c, maps: safeParse(q.mapping_c) },
      { key: "D", text: q.option_d, maps: safeParse(q.mapping_d) }
    ]
  }));
}

// ================================
// DETECT ASSESSMENT TYPE
// ================================

function getAssessmentType() {
  const params = new URLSearchParams(window.location.search);
  return params.get("assessment") || "business_owner";
}

// ================================
// ROLE DEFINITIONS (UNCHANGED)
// ================================

const ROLE_DEFINITIONS = {
  architect: {
    title: "Architect",
    description: "Visionary system builder.",
    strengths: ["Planning", "Innovation", "Systems thinking"],
    improvement: ["Execute faster", "Work with builders"]
  },
  builder: {
    title: "Builder",
    description: "Execution-focused creator.",
    strengths: ["Action", "Momentum"],
    improvement: ["Add structure", "Track progress"]
  },
  operator: {
    title: "Operator",
    description: "Efficiency and systems manager.",
    strengths: ["Organization", "Optimization"],
    improvement: ["Be flexible", "Adapt faster"]
  },
  connector: {
    title: "Connector",
    description: "Relationship and network builder.",
    strengths: ["Networking", "Influence"],
    improvement: ["Follow up", "Build systems"]
  },
  nurturer: {
    title: "Nurturer",
    description: "Community and care focused.",
    strengths: ["Empathy", "Retention"],
    improvement: ["Scale systems", "Set boundaries"]
  },
  educator: {
    title: "Educator",
    description: "Knowledge and authority builder.",
    strengths: ["Teaching", "Content"],
    improvement: ["Take action faster"]
  },
  resource_generator: {
    title: "Resource Generator",
    description: "Money and opportunity creator.",
    strengths: ["Revenue", "Growth"],
    improvement: ["Build systems"]
  },
  protector: {
    title: "Protector",
    description: "Risk and security manager.",
    strengths: ["Awareness", "Defense"],
    improvement: ["Take calculated risks"]
  },
  steward: {
    title: "Steward",
    description: "Long-term stability builder.",
    strengths: ["Consistency", "Sustainability"],
    improvement: ["Adapt to change"]
  }
};

// ================================
// LOAD QUESTIONS (🔥 FIXED)
// ================================

async function loadQuestions() {
  try {
    const assessment = getAssessmentType();

    console.log("📡 Loading:", assessment);

    const res = await fetch(
      `${API_BASE}/api/questions?assessment=${assessment}&ts=${Date.now()}`,
      { cache: "no-store" }
    );

    const data = await res.json();

    console.log("📦 RAW:", data);

    questions = normalizeQuestions(data.questions);

    if (!questions.length) {
      throw new Error("No questions returned");
    }

    currentIndex = 0;
    answers = [];

    renderQuestion();

  } catch (err) {
    console.error("❌ LOAD ERROR:", err);

    const el = document.getElementById("questionText");
    if (el) {
      el.innerText = "❌ Failed to load questions";
    }
  }
}

// ================================
// RENDER QUESTION (🔥 FIXED)
// ================================

function renderQuestion() {
  const q = questions[currentIndex];

  if (!q) {
    submitAssessment();
    return;
  }

  const questionEl = document.getElementById("questionText");
  const container = document.getElementById("optionsContainer");

  if (!questionEl || !container) {
    console.error("❌ Missing DOM elements");
    return;
  }

  questionEl.innerText = q.text || "No question";

  container.innerHTML = "";

  q.options.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "btn";
    btn.innerText = `${opt.key}: ${opt.text || "..."}`;
    btn.onclick = () => handleAnswer(opt.key);
    container.appendChild(btn);
  });

  updateProgress();
}

// ================================
// HANDLE ANSWER (🔥 FIXED)
// ================================

function handleAnswer(letter) {
  const q = questions[currentIndex];

  answers.push({
    qid: q.id,
    answer: letter
  });

  currentIndex++;
  renderQuestion();
}

// ================================
// PROGRESS (🔥 FIXED)
// ================================

function updateProgress() {
  const total = questions.length || 1;
  const done = currentIndex;
  const pct = Math.round((done / total) * 100);

  const bar = document.getElementById("progressBarFill");
  const text = document.getElementById("progress");

  if (bar) bar.style.width = pct + "%";
  if (text) {
    text.innerText = `Question ${Math.min(done + 1, total)} of ${total} (${pct}%)`;
  }
}

// ================================
// SUBMIT (🔥 FIXED ROUTING)
// ================================

async function submitAssessment() {
  const email = document.getElementById("email")?.value;
  const tenant = new URLSearchParams(window.location.search).get("tenant");
  const assessment = getAssessmentType();

  if (!email) {
    alert("Please enter your email");
    return;
  }

  const endpoint =
    assessment === "customer"
      ? "/voc-intake"
      : "/api/intake";

  try {
    console.log("🚀 Submitting:", answers);

    const res = await fetch(`${API_BASE}${endpoint}`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email,
        tenant,
        answers
      })
    });

    const data = await res.json();

    console.log("📊 RESULT:", data);

    renderResults(data);

  } catch (err) {
    console.error("❌ SUBMIT ERROR:", err);
  }
}

// ================================
// RESULTS (UNCHANGED BUT STABLE)
// ================================

function renderResults(data) {
  const primary = data.primary;
  const secondary = data.secondary;
  const weakness = data.weakness;

  const p = ROLE_DEFINITIONS[primary] || {};
  const s = ROLE_DEFINITIONS[secondary] || {};
  const w = ROLE_DEFINITIONS[weakness] || {};

  const questionEl = document.getElementById("questionText");
  const container = document.getElementById("optionsContainer");

  if (!questionEl || !container) return;

  questionEl.innerText = "🎯 Your Profile";

  container.innerHTML = `
    <div style="text-align:left; max-width:700px; margin:auto">

      <h2>🔥 Primary: ${p.title || primary}</h2>
      <p>${p.description || ""}</p>

      <ul>${(p.strengths || []).map(x => `<li>${x}</li>`).join("")}</ul>

      <hr>

      <h2>⚡ Secondary: ${s.title || secondary}</h2>
      <p>${s.description || ""}</p>

      <hr>

      <h2>⚠️ Weak Area: ${w.title || weakness}</h2>
      <p>${w.description || ""}</p>

      <ul>${(w.improvement || []).map(x => `<li>${x}</li>`).join("")}</ul>

      <hr>

      <h3>🚀 Strategy</h3>
      <p>
        Build around <b>${primary}</b>, support with <b>${secondary}</b>,
        and strengthen <b>${weakness}</b>.
      </p>

    </div>
  `;
}

// ================================
// INIT
// ================================

loadQuestions();

</script>
