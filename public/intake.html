<script src="/js/api-contract.js"></script>
<script>
"use strict";
const { ENDPOINTS, buildUrl } = window.GarveyApi;

/* ================================
   STATE
================================ */

let questions = [];
let currentIndex = 0;
let answers = [];

/* ================================
   HELPERS (BULLETPROOF)
================================ */

function safeParse(val) {
  if (!val) return [];
  if (Array.isArray(val)) return val;

  try {
    return JSON.parse(val);
  } catch {
    return [];
  }
}

function normalizeQuestions(rawQuestions = []) {
  return rawQuestions.map((q, i) => ({
    id: q.qid || q.id || `q_${i}`,
    text: q.question_text || q.text || "No question text",
    options: [
      { key: "A", text: q.option_a, maps: safeParse(q.mapping_a) },
      { key: "B", text: q.option_b, maps: safeParse(q.mapping_b) },
      { key: "C", text: q.option_c, maps: safeParse(q.mapping_c) },
      { key: "D", text: q.option_d, maps: safeParse(q.mapping_d) }
    ].filter(o => o.text) // remove empty options
  }));
}

/* ================================
   DETECT ASSESSMENT
================================ */

function getAssessmentType() {
  const params = new URLSearchParams(window.location.search);
  const type = (params.get("assessment") || "business_owner").trim().toLowerCase();
  return type === "customer" ? "customer" : "business_owner";
}

function getTenant() {
  return new URLSearchParams(window.location.search).get("tenant") || "test-business";
}

/* ================================
   ROLE DEFINITIONS
================================ */

const ROLE_DEFINITIONS = {
  architect: { title: "Architect", description: "Visionary system builder.", strengths: ["Planning","Innovation"], improvement: ["Execute faster"] },
  builder: { title: "Builder", description: "Execution-focused creator.", strengths: ["Action"], improvement: ["Structure"] },
  operator: { title: "Operator", description: "Efficiency manager.", strengths: ["Organization"], improvement: ["Adapt"] },
  connector: { title: "Connector", description: "Network builder.", strengths: ["Relationships"], improvement: ["Follow up"] },
  nurturer: { title: "Nurturer", description: "Community builder.", strengths: ["Empathy"], improvement: ["Boundaries"] },
  educator: { title: "Educator", description: "Teacher.", strengths: ["Knowledge"], improvement: ["Action"] },
  resource_generator: { title: "Resource Generator", description: "Money creator.", strengths: ["Revenue"], improvement: ["Systems"] },
  protector: { title: "Protector", description: "Risk manager.", strengths: ["Security"], improvement: ["Risk-taking"] },
  steward: { title: "Steward", description: "Stability builder.", strengths: ["Consistency"], improvement: ["Flexibility"] }
};

/* ================================
   LOAD QUESTIONS
================================ */

async function loadQuestions() {
  try {
    const assessment = getAssessmentType();

    console.log("📡 Loading:", assessment);

    const res = await fetch(
      buildUrl(ENDPOINTS.questions, { assessment, ts: Date.now() }),
      { cache: "no-store" }
    );

    const data = await res.json();

    console.log("📦 RAW RESPONSE:", data);

    if (!res.ok || !Array.isArray(data?.questions)) {
      throw new Error(data?.error || "Invalid response format");
    }

    questions = normalizeQuestions(data.questions);

    console.log("✅ NORMALIZED:", questions);

    if (!questions.length) {
      throw new Error("No questions found after normalization");
    }

    currentIndex = 0;
    answers = [];

    renderQuestion();

  } catch (err) {
    console.error("❌ LOAD ERROR:", err);
    showError("Failed to load questions");
  }
}

/* ================================
   RENDER QUESTION
================================ */

function renderQuestion() {
  const q = questions[currentIndex];

  if (!q) {
    submitAssessment();
    return;
  }

  const questionEl = document.getElementById("questionText");
  const container = document.getElementById("optionsContainer");

  if (!questionEl || !container) {
    console.error("❌ Missing DOM elements");
    return;
  }

  questionEl.innerText = q.text;

  container.innerHTML = "";

  q.options.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "btn";
    btn.innerText = `${opt.key}: ${opt.text}`;
    btn.onclick = () => handleAnswer(opt.key);
    container.appendChild(btn);
  });

  updateProgress();
}

/* ================================
   HANDLE ANSWER
================================ */

function handleAnswer(letter) {
  const q = questions[currentIndex];
  if (!q) return;

  answers.push({
    qid: q.id,
    answer: letter
  });

  currentIndex++;
  renderQuestion();
}

/* ================================
   PROGRESS
================================ */

function updateProgress() {
  const total = questions.length || 1;
  const done = currentIndex;
  const pct = Math.round((done / total) * 100);

  const bar = document.getElementById("progressBarFill");
  const text = document.getElementById("progress");

  if (bar) bar.style.width = pct + "%";
  if (text) text.innerText = `Question ${Math.min(done + 1, total)} of ${total} (${pct}%)`;
}

/* ================================
   SUBMIT
================================ */

async function submitAssessment() {
  const email = document.getElementById("email")?.value;
  const tenant = getTenant();
  const assessment = getAssessmentType();

  if (!email) {
    alert("Please enter your email");
    return;
  }

  const endpoint =
    assessment === "customer"
      ? ENDPOINTS.vocIntake
      : ENDPOINTS.intake;

  try {
    console.log("🚀 SUBMIT:", answers);

    const res = await fetch(buildUrl(endpoint), {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, tenant, answers })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data?.error || "Submission failed");

    console.log("📊 RESULT:", data);

    renderResults(data);

  } catch (err) {
    console.error("❌ SUBMIT ERROR:", err);
    showError(err?.message || "Submission failed");
  }
}

/* ================================
   RESULTS
================================ */

function renderResults(data) {
  const p = ROLE_DEFINITIONS[data.primary] || {};
  const s = ROLE_DEFINITIONS[data.secondary] || {};
  const w = ROLE_DEFINITIONS[data.weakness] || {};

  const questionEl = document.getElementById("questionText");
  const container = document.getElementById("optionsContainer");

  if (!questionEl || !container) return;

  questionEl.innerText = "🎯 Your Profile";

  container.innerHTML = `
    <h2>🔥 ${p.title || data.primary}</h2>
    <p>${p.description || ""}</p>

    <h3>⚡ ${s.title || data.secondary}</h3>
    <p>${s.description || ""}</p>

    <h3>⚠️ ${w.title || data.weakness}</h3>
    <p>${w.description || ""}</p>

    <hr>

    <button onclick="goToDashboard()">Go to Dashboard</button>
  `;
}

/* ================================
   NAVIGATION
================================ */

function goToDashboard() {
  const tenant = getTenant();
  window.location.href = `/dashboard.html?tenant=${tenant}`;
}

/* ================================
   ERROR DISPLAY
================================ */

function showError(msg) {
  const el = document.getElementById("questionText");
  if (el) el.innerText = "❌ " + msg;
}

/* ================================
   INIT
================================ */

loadQuestions();

</script>
