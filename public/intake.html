<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Business Intake Assessment</title>
<style>
body { background:#000; color:#fff; font-family:Arial, sans-serif; padding:20px; text-align:center; }
.card { max-width:760px; margin:0 auto; background:#111; border:2px solid gold; border-radius:14px; padding:18px; }
.btn { background:gold; color:#000; border:0; padding:12px; margin:8px auto; display:block; width:90%; border-radius:10px; font-weight:700; cursor:pointer; }
.btn:hover { background:#ef4444; color:#fff; }
input { padding:10px; width:90%; border-radius:8px; margin:6px auto; border:1px solid #334155; background:#0b1020; color:#fff; }
#progressWrap { width:90%; margin:12px auto; background:#1f2937; border-radius:999px; overflow:hidden; height:12px; }
#progressBarFill { width:0; height:100%; background:gold; }
#progress { color:#94a3b8; font-size:12px; }
.muted { color:#94a3b8; font-size:12px; }
</style>
</head>
<body>
  <div class="card">
    <h1>🧠 Business Intake</h1>
    <div id="tenantLine" class="muted"></div>
    <input id="email" placeholder="owner@email.com" />
    <div id="progressWrap"><div id="progressBarFill"></div></div>
    <div id="progress"></div>
    <h3 id="questionText">Loading…</h3>
    <div id="optionsContainer"></div>
  </div>

<script src="/js/api-contract.js"></script>
<script>
"use strict";
const { ENDPOINTS, buildUrl } = window.GarveyApi;

const REQUIRED_IDS = ["email", "progressBarFill", "progress", "questionText", "optionsContainer", "tenantLine"];

function assertDom() {
  const missing = REQUIRED_IDS.filter((id) => !document.getElementById(id));
  if (missing.length) {
    throw new Error(`Missing DOM elements: ${missing.join(", ")}`);
  }
}

function getTenant() {
  return (new URLSearchParams(window.location.search).get("tenant") || "test-business").trim();
}

function normalizeQuestions(rawQuestions = []) {
  return rawQuestions.map((q, i) => ({
    qid: q.qid || `BO${i + 1}`,
    text: q.question_text || q.question || "",
    options: [
      { key: "A", text: q.option_a },
      { key: "B", text: q.option_b },
      { key: "C", text: q.option_c },
      { key: "D", text: q.option_d },
    ].filter((o) => String(o.text || "").trim().length > 0),
  }));
}

let questions = [];
let currentIndex = 0;
let answers = [];

function updateProgress() {
  const total = questions.length || 1;
  const done = currentIndex;
  const pct = Math.round((done / total) * 100);
  document.getElementById("progressBarFill").style.width = pct + "%";
  document.getElementById("progress").innerText = `Question ${Math.min(done + 1, total)} of ${total} (${pct}%)`;
}

function renderQuestion() {
  const q = questions[currentIndex];
  if (!q) return submitAssessment();

  document.getElementById("questionText").innerText = q.text || "Question text unavailable";
  const container = document.getElementById("optionsContainer");
  container.innerHTML = "";

  q.options.forEach((opt) => {
    const btn = document.createElement("button");
    btn.className = "btn";
    btn.innerText = `${opt.key}: ${opt.text}`;
    btn.onclick = () => {
      answers.push({ qid: q.qid, answer: opt.key });
      currentIndex += 1;
      renderQuestion();
    };
    container.appendChild(btn);
  });

  updateProgress();
}

async function loadQuestions() {
  const res = await fetch(buildUrl(ENDPOINTS.questions, { assessment: "business_owner", ts: Date.now() }), { cache: "no-store" });
  const data = await res.json();
  if (!res.ok || !Array.isArray(data?.questions)) {
    throw new Error(data?.error || "Failed to load questions");
  }

  questions = normalizeQuestions(data.questions);
  if (!questions.length || !questions[0].text || !questions[0].options.length) {
    throw new Error("Questions payload missing display text/options");
  }

  currentIndex = 0;
  answers = [];
  renderQuestion();
}

async function submitAssessment() {
  const email = (document.getElementById("email").value || "").trim();
  if (!email) return alert("Please enter your email");

  const tenant = getTenant();
  const res = await fetch(buildUrl(ENDPOINTS.intake), {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, tenant, answers }),
  });

  const data = await res.json();
  if (!res.ok) throw new Error(data?.error || "Submission failed");

  const q = document.getElementById("questionText");
  const c = document.getElementById("optionsContainer");
  q.innerText = "✅ Intake Complete";
  c.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre><button class="btn" onclick="location.href='/dashboard.html?tenant=${encodeURIComponent(tenant)}'">Go to Dashboard</button>`;
}

function showError(msg) {
  document.getElementById("questionText").innerText = "❌ " + msg;
}

document.addEventListener("DOMContentLoaded", async () => {
  try {
    assertDom();
    document.getElementById("tenantLine").innerText = `Tenant: ${getTenant()}`;
    await loadQuestions();
  } catch (err) {
    console.error(err);
    showError(err.message || "Failed to initialize intake page");
  }
});
</script>
</body>
</html>
