<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>UJAMAA Role Assessment</title>

<style>
body {
  font-family: Arial;
  background: #000;
  color: white;
  text-align: center;
  padding: 30px;
}

.card {
  background: #111;
  border: 2px solid gold;
  padding: 30px;
  border-radius: 16px;
  max-width: 650px;
  margin: auto;
}

h1 { color: gold; }

.section {
  color: red;
  font-weight: bold;
  margin-bottom: 10px;
}

.tip {
  color: #22c55e;
  font-size: 14px;
  margin-bottom: 20px;
}

.btn {
  display: block;
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border: 2px solid black;
  border-radius: 10px;
  background: gold;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

.btn:hover {
  background: red;
  color: white;
}

.progress {
  margin-top: 10px;
  color: #94a3b8;
}

#results {
  margin-top: 20px;
}
</style>

</head>

<body>

<div class="card">
  <h1>UJAMAA Role Assessment</h1>

  <input id="email" placeholder="Enter Email" style="padding:10px; width:80%; margin-bottom:15px;" />

  <div class="section" id="sectionTitle"></div>
  <div class="tip" id="sectionTip"></div>

  <div class="progress" id="progress">Loading...</div>
  <div class="question" id="questionText"></div>
  <div id="optionsContainer"></div>

  <div id="results"></div>
</div>

<script>
let questions = [];
let currentIndex = 0;
let answers = [];
let sectionSize = 0;

const sections = [
  { name: "Identity", tip: "This section reveals how you naturally see and express yourself." },
  { name: "Decision Making", tip: "This shows how you think and make choices under pressure." },
  { name: "Community Role", tip: "This identifies your natural position within a team or system." },
  { name: "Execution Style", tip: "This shows how you take action and build results." }
];

function getSection(index) {
  return sections[Math.min(Math.floor(index / sectionSize), 3)];
}

const API_URL = "https://garveybackend.onrender.com/api/questions?mode=25";

async function loadQuestions() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    questions = data.questions || [];

    if (!questions.length) {
      throw new Error("No questions returned");
    }

    sectionSize = Math.floor(questions.length / 4);

    showQuestion();
  } catch (err) {
    console.error(err);
    document.getElementById("questionText").innerText = "❌ Failed to load questions";
  }
}

function showQuestion() {
  const q = questions[currentIndex];

  if (!q) {
    submitAssessment();
    return;
  }

  const section = getSection(currentIndex);

  document.getElementById("sectionTitle").innerText = `🔥 ${section.name}`;
  document.getElementById("sectionTip").innerText = section.tip;

  document.getElementById("questionText").innerText = q.question;
  document.getElementById("progress").innerText =
    `Question ${currentIndex + 1} of ${questions.length}`;

  const container = document.getElementById("optionsContainer");
  container.innerHTML = "";

  const options = {
    A: q.option_a,
    B: q.option_b,
    C: q.option_c,
    D: q.option_d
  };

  Object.entries(options).forEach(([key, value]) => {
    const btn = document.createElement("button");
    btn.className = "btn";
    btn.innerText = `${key}: ${value}`;
    btn.onclick = () => handleAnswer(q.qid, key);
    container.appendChild(btn);
  });
}

function handleAnswer(qid, option) {
  answers.push({ qid, answer: option });
  currentIndex++;

  if (sectionSize && currentIndex % sectionSize === 0 && currentIndex !== 0) {
    alert("✅ Section complete — we now understand this aspect of you.");
  }

  showQuestion();
}

async function submitAssessment() {
  const email = document.getElementById("email").value.trim();
  const tenant = new URLSearchParams(window.location.search).get("tenant");

  if (!email) {
    alert("Please enter your email");
    return;
  }

  if (!tenant) {
    document.getElementById("questionText").innerText =
      "⚠️ Invalid access link. Please use your invite link.";
    return;
  }

  try {
    const res = await fetch("https://garveybackend.onrender.com/api/intake", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email,
        tenant,
        answers
      })
    });

    if (!res.ok) {
      const text = await res.text();
      throw new Error(text);
    }

    const data = await res.json();
    renderResults(data);

  } catch (err) {
    console.error("SUBMIT ERROR:", err);
    document.getElementById("questionText").innerText =
      "❌ Submission failed. Check console.";
  }
}

function renderResults(data) {
  if (!data || !data.primary_role) {
    document.getElementById("questionText").innerText =
      "❌ No results returned from server";
    return;
  }

  document.getElementById("questionText").innerText = "🎯 Your Results";
  document.getElementById("optionsContainer").innerHTML = "";

  const container = document.getElementById("results");

  container.innerHTML = `
    <h2 style="color:gold;">Primary: ${data.primary_role}</h2>
    <h3 style="color:red;">Secondary: ${data.secondary_role}</h3>
    <div id="scores"></div>
  `;

  if (data.scores) {
    renderScoreBars(data.scores);
  }
}

function renderScoreBars(scores) {
  const container = document.getElementById("scores");

  Object.entries(scores).forEach(([role, value]) => {
    const bar = document.createElement("div");

    bar.innerHTML = `
      <div style="margin:10px 0;">
        <strong>${role}</strong>
        <div style="background:#222;">
          <div style="
            width:${value * 5}px;
            background:green;
            height:10px;
          "></div>
        </div>
      </div>
    `;

    container.appendChild(bar);
  });
}

loadQuestions();
</script>

</body>
</html>
