<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Garvey BII Intake</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 760px; margin: 24px auto; }
    .bar-wrap { width: 100%; background: #eee; border-radius: 8px; height: 16px; margin: 12px 0; }
    .bar { height: 100%; width: 0%; border-radius: 8px; background: #2f7cf6; }
    .choices button { margin-right: 8px; margin-bottom: 8px; }
  </style>
</head>
<body>
  <h1>Business Intelligence Intake</h1>

  <label>Email <input id="email" type="email" value="test@email.com" /></label>
  <label>Tenant Slug <input id="tenant" value="test-business" /></label>
  <label>Mode
    <select id="mode" onchange="resetFlow()">
      <option value="quick">25 Questions</option>
      <option value="deep">60 Questions</option>
    </select>
  </label>

  <p id="sectionLabel"></p>
  <p id="questionLabel"></p>
  <div class="bar-wrap"><div class="bar" id="progressBar"></div></div>
  <p id="percent"></p>

  <div class="choices">
    <button onclick="selectAnswer('A')">A</button>
    <button onclick="selectAnswer('B')">B</button>
    <button onclick="selectAnswer('C')">C</button>
    <button onclick="selectAnswer('D')">D</button>
  </div>

  <button id="submitBtn" onclick="submitIntake()" disabled>Submit Intake</button>

  <h2>Result</h2>
  <pre id="result"></pre>

  <script>
    const sectionNames = ["Vision", "Operations", "Growth", "Customer", "Systems"];
    let answers = [];

    function hydrateFromQuery() {
      const params = new URLSearchParams(window.location.search);
      const tenant = params.get("tenant");
      if (tenant) {
        document.getElementById("tenant").value = tenant;
      }
    }

    function totalQuestions() {
      return document.getElementById("mode").value === "deep" ? 60 : 25;
    }

    function renderQuestion() {
      const total = totalQuestions();
      const index = answers.length;
      document.getElementById("questionLabel").innerText =
        index < total ? `Question ${index + 1} of ${total}` : `Completed ${total} of ${total}`;

      const sectionIndex = Math.min(Math.floor((index / total) * sectionNames.length), sectionNames.length - 1);
      document.getElementById("sectionLabel").innerText = `Section: ${sectionNames[sectionIndex]}`;

      const percent = Math.round((answers.length / total) * 100);
      document.getElementById("progressBar").style.width = `${percent}%`;
      document.getElementById("percent").innerText = `${percent}% complete`;
      document.getElementById("submitBtn").disabled = answers.length !== total;
    }

    function selectAnswer(value) {
      if (answers.length >= totalQuestions()) return;
      answers.push(value);
      renderQuestion();
    }

    function resetFlow() {
      answers = [];
      document.getElementById("result").innerText = "";
      renderQuestion();
    }

    async function submitIntake() {
      const payload = {
        email: document.getElementById("email").value,
        tenant_slug: document.getElementById("tenant").value,
        mode: document.getElementById("mode").value,
        answers
      };

      const res = await fetch("/intake", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      const data = await res.json();
      document.getElementById("result").innerText = JSON.stringify(data, null, 2);
    }

    hydrateFromQuery();
    renderQuestion();
  </script>
</body>
</html>
