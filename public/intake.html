<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UJAMAA Intake</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 40px;
    }

    .card {
      background: #1e293b;
      padding: 30px;
      border-radius: 10px;
      max-width: 600px;
      margin: auto;
    }

    button {
      display: block;
      width: 100%;
      margin: 10px 0;
      padding: 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #38bdf8;
      color: black;
      font-weight: bold;
      font-size: 16px;
    }

    #progress {
      margin-bottom: 15px;
      opacity: 0.7;
    }
  </style>

</head>

<body>

  <div class="card">
    <h2>UJAMAA Role Assessment</h2>
    <div id="progress">Loading questions...</div>
    <div id="question"></div>
    <div id="answers"></div>
  </div>

  <script>
    let questions = [];
    let currentIndex = 0;
    let answers = [];

    const email = prompt("Enter your email:");
    const tenant = "default";

    // LOAD QUESTIONS FROM BACKEND
    async function loadQuestions() {
      try {
        const res = await fetch("/api/questions");
        const data = await res.json();

        questions = data.questions || data;

        if (!questions.length) {
          document.getElementById("question").innerText = "No questions found.";
          return;
        }

        renderQuestion();
      } catch (err) {
        console.error(err);
        document.getElementById("question").innerText = "Error loading questions.";
      }
    }

    // DISPLAY CURRENT QUESTION
    function renderQuestion() {
      const q = questions[currentIndex];

      document.getElementById("progress").innerText =
        `Question ${currentIndex + 1} of ${questions.length}`;

      document.getElementById("question").innerText = q.question;

      const answersDiv = document.getElementById("answers");
      answersDiv.innerHTML = "";

      ["a", "b", "c", "d"].forEach(letter => {
        const btn = document.createElement("button");
        btn.innerText = q[`option_${letter}`] || letter.toUpperCase();
        btn.onclick = () => handleAnswer(q.qid, letter.toUpperCase());
        answersDiv.appendChild(btn);
      });
    }

    // HANDLE USER ANSWER
    function handleAnswer(qid, answer) {
      answers.push({ qid, answer });

      currentIndex++;

      if (currentIndex < questions.length) {
        renderQuestion();
      } else {
        submitAnswers();
      }
    }

    // SUBMIT RESULTS TO BACKEND
    async function submitAnswers() {
      try {
        const res = await fetch("/api/intake", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            email,
            tenant,
            answers
          })
        });

        const result = await res.json();

        document.querySelector(".card").innerHTML = `
          <h2>Results</h2>
          <p><strong>Primary Role:</strong> ${result.primary_role}</p>
          <p><strong>Secondary Role:</strong> ${result.secondary_role}</p>
        `;
      } catch (err) {
        console.error(err);
        document.querySelector(".card").innerHTML = "Error submitting results.";
      }
    }

    // START SYSTEM
    loadQuestions();
  </script>

</body>
</html>
