<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UJAMAA Intake</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 40px;
    }

    .card {
      background: #1e293b;
      padding: 30px;
      border-radius: 10px;
      max-width: 600px;
      margin: auto;
    }

    button {
      display: block;
      width: 100%;
      margin: 10px 0;
      padding: 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #38bdf8;
      color: black;
      font-weight: bold;
      font-size: 16px;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #progress {
      margin-bottom: 15px;
      opacity: 0.7;
    }
  </style>

</head>

<body>

  <div class="card">
    <h2>UJAMAA Role Assessment</h2>
    <div id="progress">Loading questions...</div>
    <div id="question"></div>
    <div id="answers"></div>
  </div>

  <script>
    const BASE_URL = "https://garveybackend.onrender.com";

    let questions = [];
    let currentIndex = 0;
    let answers = [];
    let isSubmitting = false;

    const email = prompt("Enter your email:") || "guest@test.com";
    const tenant = "default";

    // LOAD QUESTIONS FROM BACKEND
    async function loadQuestions() {
      try {
        const res = await fetch(`${BASE_URL}/api/questions`);

        if (!res.ok) {
          throw new Error(`Failed to fetch questions: ${res.status}`);
        }

        const data = await res.json();

        questions = data.questions || data;

        if (!Array.isArray(questions) || questions.length === 0) {
          document.getElementById("question").innerText = "No questions found.";
          return;
        }

        renderQuestion();

      } catch (err) {
        console.error("LOAD ERROR:", err);
        document.getElementById("question").innerText = "Error loading questions.";
      }
    }

    // DISPLAY CURRENT QUESTION
    function renderQuestion() {
      const q = questions[currentIndex];

      if (!q) {
        document.getElementById("question").innerText = "Invalid question data.";
        return;
      }

      document.getElementById("progress").innerText =
        `Question ${currentIndex + 1} of ${questions.length}`;

      document.getElementById("question").innerText =
        q.question || "No question text";

      const answersDiv = document.getElementById("answers");
      answersDiv.innerHTML = "";

      ["a", "b", "c", "d"].forEach(letter => {
        const btn = document.createElement("button");
        btn.innerText = q[`option_${letter}`] || letter.toUpperCase();
        btn.onclick = () => handleAnswer(q.qid, letter.toUpperCase());
        answersDiv.appendChild(btn);
      });
    }

    // HANDLE USER ANSWER
    function handleAnswer(qid, answer) {
      if (isSubmitting) return;

      answers.push({ qid, answer });

      currentIndex++;

      if (currentIndex < questions.length) {
        renderQuestion();
      } else {
        submitAnswers();
      }
    }

    // SUBMIT RESULTS TO BACKEND
    async function submitAnswers() {
      if (isSubmitting) return;
      isSubmitting = true;

      document.getElementById("question").innerText = "Submitting...";
      document.getElementById("answers").innerHTML = "";

      try {
        const res = await fetch(`${BASE_URL}/api/intake`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            email,
            tenant,
            answers,
            mode: "assessment"
          })
        });

        if (!res.ok) {
          const text = await res.text();
          throw new Error(`Server error: ${res.status} - ${text}`);
        }

        const result = await res.json();

        document.querySelector(".card").innerHTML = `
          <h2>Results</h2>
          <p><strong>Primary Role:</strong> ${result.primary_role || "N/A"}</p>
          <p><strong>Secondary Role:</strong> ${result.secondary_role || "N/A"}</p>
        `;

      } catch (err) {
        console.error("SUBMIT ERROR:", err);

        document.querySelector(".card").innerHTML = `
          <h2>Error</h2>
          <p>Something went wrong submitting your results.</p>
          <pre style="color:red;">${err.message}</pre>
        `;
      }
    }

    // START SYSTEM
    loadQuestions();
  </script>

</body>
</html>
