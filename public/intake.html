<!-- FILE: public/intake.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Garvey Intake</title>
  <style>
    body { font-family: Arial, sans-serif; background:#000; color:#fff; text-align:center; padding:24px; }
    .card { background:#111; border:2px solid gold; padding:24px; border-radius:16px; max-width:760px; margin:0 auto; }
    h1 { color: gold; margin-top:0; }
    .section { color:#ef4444; font-weight:bold; margin:10px 0 6px; }
    .tip { color:#22c55e; font-size:14px; margin-bottom:14px; }
    .progress { margin-top:10px; color:#94a3b8; font-size:14px; }
    .bar { height:10px; background:#222; border-radius:999px; overflow:hidden; margin-top:10px; }
    .bar > div { height:100%; width:0%; background:#22c55e; transition: width 120ms linear; }

    .btn { display:block; width:100%; padding:14px; margin:10px 0; border-radius:10px; border:2px solid #000;
      background:gold; color:#000; font-weight:700; cursor:pointer; text-align:left; line-height:1.25; }
    .btn:hover { background:#ef4444; color:#fff; }
    .btn:disabled { opacity:0.6; cursor:not-allowed; }

    select, input { padding:10px; margin:8px 0; width:min(520px,92%); border-radius:10px; border:1px solid #334155; background:#0b1020; color:#fff; }
    .row { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin:10px 0 6px; }
    .meta { color:#94a3b8; font-size:12px; margin-top:6px; }
    .err { color:#fca5a5; }
    a { color:#93c5fd; } a:hover { color:#bfdbfe; }
  </style>
</head>

<body>
  <div class="card">
    <h1>Garvey Role Assessment</h1>

    <div class="row">
      <input id="email" placeholder="Enter Email" value="test@email.com" />
      <select id="mode" title="Mode">
        <option value="25">Quick (25 Questions)</option>
        <option value="60">Deep (60 Questions)</option>
      </select>
    </div>

    <div class="meta" id="apiMeta"></div>
    <div class="meta" id="tenantMeta"></div>

    <div class="section" id="sectionTitle"></div>
    <div class="tip" id="sectionTip"></div>

    <div class="progress" id="progress">Loading…</div>
    <div class="bar"><div id="progressBarFill"></div></div>

    <div style="margin-top:12px; font-size:18px;" id="questionText"></div>
    <div id="optionsContainer"></div>

    <div id="results"></div>

    <div class="meta" style="margin-top:14px;">
      <a href="/dashboard.html">Dashboard</a> |
      <a href="/admin.html">Admin</a> |
      <a href="/voc.html">VOC</a> |
      <a href="/index.html">CX Engine</a>
    </div>
  </div>

  <script>
    const API_BASE = (() => {
      const host = window.location.hostname || "";
      if (host.includes("garveyfrontend")) return "https://garveybackend.onrender.com";
      return "";
    })();

    const sections = [
      { name: "Identity", tip: "How you naturally express yourself." },
      { name: "Decision Making", tip: "How you think under pressure." },
      { name: "Community Role", tip: "Your natural position in a system." },
      { name: "Execution", tip: "How you take action and build." }
    ];

    let answers = [];
    let current = null;
    let totalTarget = 25;

    function getTenant() {
      const params = new URLSearchParams(window.location.search);
      return (params.get("tenant") || "").trim();
    }

    function setMeta() {
      document.getElementById("apiMeta").innerText =
        API_BASE ? `API: ${API_BASE}` : "API: same-origin";

      const tenant = getTenant();
      document.getElementById("tenantMeta").innerText = tenant
        ? `Tenant: ${tenant}`
        : "⚠️ Missing tenant. Open with: /intake.html?tenant=test-business";
    }

    function setProgress() {
      const done = answers.length;
      const pct = Math.round((done / totalTarget) * 100);
      document.getElementById("progressBarFill").style.width = `${pct}%`;
      document.getElementById("progress").innerText =
        `Question ${Math.min(done + 1, totalTarget)} of ${totalTarget} (${pct}%)`;
    }

    function getSectionByIndex(index) {
      const sectionSize = Math.max(1, Math.floor(totalTarget / sections.length));
      const idx = Math.min(Math.floor(index / sectionSize), sections.length - 1);
      return sections[idx];
    }

    function renderQuestion(q) {
      current = q;
      const idx = answers.length;
      const section = getSectionByIndex(idx);

      document.getElementById("sectionTitle").innerText = `🔥 ${section.name}`;
      document.getElementById("sectionTip").innerText = section.tip;
      document.getElementById("questionText").innerText = q?.question || "(missing question text)";

      const container = document.getElementById("optionsContainer");
      container.innerHTML = "";

      const options = [
        ["A", q.option_a],
        ["B", q.option_b],
        ["C", q.option_c],
        ["D", q.option_d]
      ];

      for (const [key, value] of options) {
        const btn = document.createElement("button");
        btn.className = "btn";
        btn.innerText = `${key}: ${value || ""}`;
        btn.disabled = !value;
        btn.onclick = () => choose(key);
        container.appendChild(btn);
      }

      setProgress();
    }

    async function fetchNext() {
      const mode = document.getElementById("mode").value;
      totalTarget = mode === "60" ? 60 : 25;

      const res = await fetch(`${API_BASE}/api/questions/next`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ mode, answers })
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data?.error || "Failed to fetch next question");

      if (data.done) return null;
      return data.question;
    }

    async function choose(option) {
      if (!current?.qid) return;

      answers.push({ qid: current.qid, answer: option });

      if (answers.length >= totalTarget) {
        await submitAssessment();
        return;
      }

      const next = await fetchNext();
      if (!next) {
        await submitAssessment();
        return;
      }

      renderQuestion(next);
    }

    async function submitAssessment() {
      const email = document.getElementById("email").value.trim();
      const tenant = getTenant();

      if (!email) { alert("Enter email"); return; }
      if (!tenant) {
        document.getElementById("questionText").innerText = "⚠️ Invalid access link (missing tenant)";
        document.getElementById("optionsContainer").innerHTML = "";
        return;
      }

      try {
        document.getElementById("questionText").innerText = "Submitting…";
        document.getElementById("optionsContainer").innerHTML = "";
        setProgress();

        const res = await fetch(`${API_BASE}/api/intake`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, tenant, answers })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data?.error || "Submission failed");

        renderResults(data);
      } catch (err) {
        console.error(err);
        document.getElementById("questionText").innerText = "❌ Submission failed";
        document.getElementById("results").innerHTML = `<div class="meta err">Error: ${err.message}</div>`;
      }
    }

    function renderResults(data) {
      document.getElementById("questionText").innerText = "🎯 Your Results";
      const container = document.getElementById("results");

      container.innerHTML = `
        <h2 style="color:gold; margin: 6px 0;">Primary: ${data.primary_role || "(missing)"}</h2>
        <h3 style="color:#ef4444; margin: 6px 0;">Secondary: ${data.secondary_role || "(missing)"}</h3>
        <div class="meta">Session: ${data.session_id || "(missing)"}</div>
        <div id="scores"></div>
      `;

      const scoresEl = document.getElementById("scores");
      const entries = Object.entries(data.scores || {});
      if (!entries.length) {
        scoresEl.innerHTML = `<div class="meta">No score breakdown returned.</div>`;
        return;
      }

      entries.sort((a,b) => Number(b[1]) - Number(a[1]));
      for (const [role, value] of entries) {
        const pct = Math.max(0, Math.min(100, Number(value) * 10));
        const row = document.createElement("div");
        row.style.margin = "10px 0";
        row.innerHTML = `
          <div style="display:flex; justify-content:space-between;">
            <strong>${role}</strong>
            <span class="meta">${value}</span>
          </div>
          <div style="background:#222; border-radius:999px; overflow:hidden; height:10px;">
            <div style="width:${pct}%; background:#22c55e; height:10px;"></div>
          </div>
        `;
        scoresEl.appendChild(row);
      }
    }

    async function resetAndStart() {
      answers = [];
      document.getElementById("results").innerHTML = "";
      document.getElementById("questionText").innerText = "Loading…";
      document.getElementById("optionsContainer").innerHTML = "";

      const first = await fetchNext();
      if (!first) throw new Error("No question returned (seed/bank empty?)");
      renderQuestion(first);
    }

    document.getElementById("mode").addEventListener("change", () => {
      resetAndStart().catch((e) => {
        console.error(e);
        document.getElementById("questionText").innerText = "❌ Failed to start";
        document.getElementById("results").innerHTML = `<div class="meta err">${e.message}</div>`;
      });
    });

    setMeta();
    resetAndStart().catch((e) => {
      console.error(e);
      document.getElementById("questionText").innerText = "❌ Failed to start";
      document.getElementById("results").innerHTML = `<div class="meta err">${e.message}</div>`;
    });
  </script>
</body>
</html>
