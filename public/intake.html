<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UJAMAA Role Assessment</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 40px;
    }

    .card {
      background: #1e293b;
      padding: 30px;
      border-radius: 16px;
      max-width: 600px;
      margin: auto;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    h1 {
      margin-bottom: 10px;
    }

    .question {
      font-size: 20px;
      margin: 20px 0;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: black;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn:hover {
      background: #16a34a;
    }

    .progress {
      margin-top: 10px;
      font-size: 14px;
      color: #94a3b8;
    }
  </style>

</head>

<body>

<div class="card">
  <h1>UJAMAA Role Assessment</h1>
  <div class="progress" id="progress">Loading...</div>
  <div class="question" id="questionText"></div>
  <div id="optionsContainer"></div>
</div>

<script>
let questions = [];
let currentIndex = 0;
let answers = [];

// ✅ CORRECT BACKEND URL
const API_URL = "https://garveybackend.onrender.com/api/questions?mode=25";

async function loadQuestions() {
  try {
    const res = await fetch(API_URL);

    if (!res.ok) {
      throw new Error("Network response was not ok");
    }

    const data = await res.json();

    // ✅ FIX: correct data structure
    questions = data.questions;

    showQuestion();

  } catch (err) {
    console.error(err);
    document.getElementById("questionText").innerText = "❌ Failed to load questions";
  }
}

function showQuestion() {
  const q = questions[currentIndex];

  if (!q) {
    document.getElementById("questionText").innerText = "✅ Complete!";
    document.getElementById("optionsContainer").innerHTML = "";
    console.log("Final Answers:", answers);
    return;
  }

  // QUESTION TEXT
  document.getElementById("questionText").innerText = q.question;

  // PROGRESS
  document.getElementById("progress").innerText =
    `Question ${currentIndex + 1} of ${questions.length}`;

  // OPTIONS (FIXED MAPPING)
  const container = document.getElementById("optionsContainer");
  container.innerHTML = "";

  const options = {
    A: q.option_a,
    B: q.option_b,
    C: q.option_c,
    D: q.option_d
  };

  Object.entries(options).forEach(([key, value]) => {
    const btn = document.createElement("button");

    btn.className = "btn";
    btn.innerText = `${key}: ${value}`;

    btn.onclick = () => handleAnswer(q.qid, key);

    container.appendChild(btn);
  });
}

function handleAnswer(qid, option) {
  answers.push({ qid, answer: option });

  currentIndex++;
  showQuestion();
}

loadQuestions();
</script>

</body>
</html>
