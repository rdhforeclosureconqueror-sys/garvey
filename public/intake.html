<script>
"use strict";

// ================================
// API BASE (AUTO DETECT)
// ================================

const API_BASE = (() => {
  const host = window.location.hostname || "";
  if (host.includes("garveyfrontend")) {
    return "https://garveybackend.onrender.com";
  }
  return "";
})();

// ================================
// STATE
// ================================

let questions = [];
let currentIndex = 0;
let answers = [];

// ================================
// ROLE DEFINITIONS (INTELLIGENCE)
// ================================

const ROLE_DEFINITIONS = {
  architect: {
    title: "Architect",
    description: "Visionary system builder.",
    strengths: ["Planning", "Innovation", "Systems thinking"],
    improvement: ["Execute faster", "Work with builders"]
  },
  builder: {
    title: "Builder",
    description: "Execution-focused creator.",
    strengths: ["Action", "Momentum"],
    improvement: ["Add structure", "Track progress"]
  },
  operator: {
    title: "Operator",
    description: "Efficiency and systems manager.",
    strengths: ["Organization", "Optimization"],
    improvement: ["Be flexible", "Adapt faster"]
  },
  connector: {
    title: "Connector",
    description: "Relationship and network builder.",
    strengths: ["Networking", "Influence"],
    improvement: ["Follow up", "Build systems"]
  },
  nurturer: {
    title: "Nurturer",
    description: "Community and care focused.",
    strengths: ["Empathy", "Retention"],
    improvement: ["Scale systems", "Set boundaries"]
  },
  educator: {
    title: "Educator",
    description: "Knowledge and authority builder.",
    strengths: ["Teaching", "Content"],
    improvement: ["Take action faster"]
  },
  resource_generator: {
    title: "Resource Generator",
    description: "Money and opportunity creator.",
    strengths: ["Revenue", "Growth"],
    improvement: ["Build systems"]
  },
  protector: {
    title: "Protector",
    description: "Risk and security manager.",
    strengths: ["Awareness", "Defense"],
    improvement: ["Take calculated risks"]
  },
  steward: {
    title: "Steward",
    description: "Long-term stability builder.",
    strengths: ["Consistency", "Sustainability"],
    improvement: ["Adapt to change"]
  }
};

// ================================
// LOAD QUESTIONS
// ================================

async function loadQuestions() {
  try {
    const res = await fetch(
      `${API_BASE}/api/questions?assessment=business_owner&ts=${Date.now()}`,
      { cache: "no-store" }
    );

    const data = await res.json();

    questions = data.questions || [];

    if (!questions.length) {
      throw new Error("No questions returned");
    }

    currentIndex = 0;
    answers = [];

    renderQuestion();

  } catch (err) {
    console.error(err);
    document.getElementById("questionText").innerText =
      "❌ Failed to load questions";
  }
}

// ================================
// RENDER QUESTION
// ================================

function renderQuestion() {
  const q = questions[currentIndex];

  if (!q) {
    submitAssessment();
    return;
  }

  document.getElementById("questionText").innerText = q.question_text;

  const container = document.getElementById("optionsContainer");
  container.innerHTML = "";

  const options = [
    ["A", q.option_a],
    ["B", q.option_b],
    ["C", q.option_c],
    ["D", q.option_d]
  ];

  for (const [key, value] of options) {
    const btn = document.createElement("button");
    btn.className = "btn";
    btn.innerText = `${key}: ${value}`;
    btn.onclick = () => handleAnswer(key);
    container.appendChild(btn);
  }

  updateProgress();
}

// ================================
// HANDLE ANSWER
// ================================

function handleAnswer(letter) {
  const q = questions[currentIndex];

  answers.push({
    qid: q.qid,
    answer: letter
  });

  currentIndex++;
  renderQuestion();
}

// ================================
// PROGRESS
// ================================

function updateProgress() {
  const total = questions.length;
  const done = currentIndex;
  const pct = Math.round((done / total) * 100);

  document.getElementById("progressBarFill").style.width = pct + "%";
  document.getElementById("progress").innerText =
    `Question ${done + 1} of ${total} (${pct}%)`;
}

// ================================
// SUBMIT
// ================================

async function submitAssessment() {
  const email = document.getElementById("email").value;
  const tenant = new URLSearchParams(window.location.search).get("tenant");

  const res = await fetch(`${API_BASE}/api/intake`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      email,
      tenant,
      answers
    })
  });

  const data = await res.json();

  renderResults(data);
}

// ================================
// RESULTS (UPGRADED)
// ================================

function renderResults(data) {
  const primary = data.primary;
  const secondary = data.secondary;
  const weakness = data.weakness;

  const p = ROLE_DEFINITIONS[primary] || {};
  const s = ROLE_DEFINITIONS[secondary] || {};
  const w = ROLE_DEFINITIONS[weakness] || {};

  document.getElementById("questionText").innerText =
    "🎯 Your Business Profile";

  document.getElementById("optionsContainer").innerHTML = `
    <div style="text-align:left; max-width:700px; margin:auto">

      <h2>🔥 Primary: ${p.title || primary}</h2>
      <p>${p.description || ""}</p>

      <h3>Strengths:</h3>
      <ul>${(p.strengths || []).map(x => `<li>${x}</li>`).join("")}</ul>

      <hr>

      <h2>⚡ Secondary: ${s.title || secondary}</h2>
      <p>${s.description || ""}</p>

      <hr>

      <h2>⚠️ Weak Area: ${w.title || weakness}</h2>
      <p>${w.description || ""}</p>

      <h3>How to Improve:</h3>
      <ul>${(w.improvement || []).map(x => `<li>${x}</li>`).join("")}</ul>

      <hr>

      <h3>🚀 System Strategy</h3>
      <p>
        Build around <b>${primary}</b>, support with <b>${secondary}</b>,
        and improve <b>${weakness}</b>.
      </p>

    </div>
  `;
}

// ================================
// INIT
// ================================

loadQuestions();

</script>
