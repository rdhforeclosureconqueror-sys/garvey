<script>
const API_BASE = (() => {
  const host = window.location.hostname || "";
  if (host.includes("garveyfrontend")) return "https://garveybackend.onrender.com";
  return "";
})();

let questions = [];
let currentIndex = 0;
let answers = [];

// ================================
// LOAD QUESTIONS (NEW SYSTEM)
// ================================

async function loadQuestions() {
  try {
    const res = await fetch(`${API_BASE}/api/questions?assessment=business_owner
    const data = await res.json();

    questions = data.questions || [];

    if (!questions.length) {
      throw new Error("No questions returned");
    }

    currentIndex = 0;
    answers = [];

    renderQuestion();

  } catch (err) {
    console.error(err);
    document.getElementById("questionText").innerText = "❌ Failed to load questions";
  }
}

// ================================
// RENDER QUESTION (FIXED)
// ================================

function renderQuestion() {
  const q = questions[currentIndex];

  if (!q) {
    submitAssessment();
    return;
  }

  document.getElementById("questionText").innerText = q.question_text;

  const container = document.getElementById("optionsContainer");
  container.innerHTML = "";

  const options = [
    ["A", q.option_a],
    ["B", q.option_b],
    ["C", q.option_c],
    ["D", q.option_d]
  ];

  for (const [key, value] of options) {
    const btn = document.createElement("button");
    btn.className = "btn";
    btn.innerText = `${key}: ${value}`;
    btn.onclick = () => handleAnswer(key);
    container.appendChild(btn);
  }

  updateProgress();
}

// ================================
// HANDLE ANSWER (NEW)
// ================================

function handleAnswer(letter) {
  const q = questions[currentIndex];

  answers.push({
    qid: q.qid,
    answer: letter
  });

  currentIndex++;
  renderQuestion();
}

// ================================
// PROGRESS
// ================================

function updateProgress() {
  const total = questions.length;
  const done = currentIndex;
  const pct = Math.round((done / total) * 100);

  document.getElementById("progressBarFill").style.width = pct + "%";
  document.getElementById("progress").innerText =
    `Question ${done + 1} of ${total} (${pct}%)`;
}

// ================================
// SUBMIT (UNCHANGED BUT CLEAN)
// ================================

async function submitAssessment() {
  const email = document.getElementById("email").value;
  const tenant = new URLSearchParams(window.location.search).get("tenant");

  const res = await fetch(`${API_BASE}/api/intake`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      email,
      tenant,
      answers
    })
  });

  const data = await res.json();

  renderResults(data);
}

// ================================
// RESULTS
// ================================

function renderResults(data) {
  document.getElementById("questionText").innerText = "🎯 Results";

  document.getElementById("optionsContainer").innerHTML = `
    <h2>Primary: ${data.primary}</h2>
    <h3>Secondary: ${data.secondary}</h3>
    <h4>Weakness: ${data.weakness}</h4>
  `;
}

// ================================

loadQuestions();
</script>
