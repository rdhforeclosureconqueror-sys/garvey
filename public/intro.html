<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Entering the Lion's Den</title>
    <style>
      :root {
        --bg: #04070f;
        --fg: #f2f6ff;
        --accent: #8da9ff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: "Inter", "SF Pro Display", "Segoe UI", Roboto, Arial, sans-serif;
        overflow: hidden;
      }

      .intro-shell {
        position: relative;
        width: 100%;
        height: 100%;
        background: #000;
        isolation: isolate;
      }

      .intro-video,
      .intro-still {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      .intro-video {
        object-fit: cover;
        object-position: center;
        filter: saturate(1.1) contrast(1.07) brightness(0.9);
      }

      .intro-still {
        display: none;
        background:
          radial-gradient(120% 120% at 50% 20%, rgba(255, 170, 92, 0.2) 0%, rgba(8, 12, 26, 0.2) 42%, rgba(3, 5, 12, 0.95) 100%),
          linear-gradient(180deg, #130a0a 0%, #090b17 42%, #05070d 100%);
      }

      .intro-still::before,
      .intro-still::after {
        content: "";
        position: absolute;
        inset: -12%;
        pointer-events: none;
      }

      .intro-still::before {
        background:
          radial-gradient(circle at 20% 80%, rgba(255, 138, 38, 0.28), transparent 52%),
          radial-gradient(circle at 80% 18%, rgba(255, 198, 98, 0.24), transparent 48%),
          radial-gradient(circle at 40% 35%, rgba(255, 81, 0, 0.17), transparent 62%);
        filter: blur(12px) saturate(1.18);
        animation: flameShimmer 3.4s ease-in-out infinite alternate;
      }

      .intro-still::after {
        background: linear-gradient(105deg, transparent 35%, rgba(255, 235, 188, 0.25) 50%, transparent 66%);
        mix-blend-mode: screen;
        transform: translateX(-55%);
        animation: lightSweep 3.8s ease-in-out infinite;
      }

      .intro-still-graphic {
        position: absolute;
        inset: 0;
        background-image:
          radial-gradient(circle at 50% 38%, rgba(255, 232, 171, 0.2), transparent 32%),
          url('/archetype-card/background.png');
        background-size: auto, cover;
        background-position: center;
        filter: grayscale(0.08) sepia(0.32) saturate(1.18) contrast(1.06) brightness(0.88);
        opacity: 0.82;
        transform: scale(1.02);
        animation: fireColorDrift 4.1s ease-in-out infinite alternate;
      }

      .intro-overlay {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 24px;
        background:
          radial-gradient(circle at center, rgba(3, 8, 24, 0.22) 0%, rgba(2, 6, 18, 0.5) 58%, rgba(1, 4, 13, 0.8) 100%),
          linear-gradient(to bottom, rgba(2, 5, 15, 0.54), rgba(2, 5, 15, 0.52));
      }

      .intro-title {
        margin: 0;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        font-size: clamp(1.18rem, 4.7vw, 2rem);
        line-height: 1.28;
        font-weight: 600;
        text-shadow: 0 0 28px rgba(141, 169, 255, 0.35), 0 0 12px rgba(0, 0, 0, 0.9);
      }

      .intro-title .accent {
        color: var(--accent);
      }

      .intro-skip {
        position: absolute;
        left: 50%;
        bottom: max(14px, env(safe-area-inset-bottom));
        transform: translateX(-50%);
        border: 1px solid rgba(255, 255, 255, 0.24);
        background: rgba(5, 8, 20, 0.38);
        color: rgba(255, 255, 255, 0.88);
        padding: 9px 14px;
        border-radius: 999px;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        backdrop-filter: blur(4px);
      }

      .intro-shell[data-intro-mode='still'] .intro-video {
        display: none;
      }

      .intro-shell[data-intro-mode='still'] .intro-still {
        display: block;
      }

      .intro-shell[data-intro-mode='still'] .intro-title {
        text-shadow:
          0 0 20px rgba(255, 166, 96, 0.4),
          0 0 40px rgba(255, 110, 22, 0.24),
          0 0 12px rgba(0, 0, 0, 0.86);
      }

      @keyframes flameShimmer {
        0% {
          transform: translate3d(-1.5%, -1.2%, 0) scale(1.02);
          opacity: 0.58;
        }
        100% {
          transform: translate3d(1.8%, 1.4%, 0) scale(1.06);
          opacity: 0.9;
        }
      }

      @keyframes lightSweep {
        0% {
          transform: translateX(-58%);
          opacity: 0;
        }
        18% {
          opacity: 0.2;
        }
        45% {
          opacity: 0.56;
        }
        100% {
          transform: translateX(52%);
          opacity: 0;
        }
      }

      @keyframes fireColorDrift {
        0% {
          filter: grayscale(0.09) sepia(0.28) saturate(1.09) hue-rotate(-5deg) brightness(0.86);
        }
        100% {
          filter: grayscale(0.05) sepia(0.4) saturate(1.3) hue-rotate(5deg) brightness(0.96);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .intro-still::before,
        .intro-still::after,
        .intro-still-graphic {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <main id="introShell" class="intro-shell" aria-label="Intro gate" data-intro-mode="video">
      <video
        id="lionIntroVideo"
        class="intro-video"
        autoplay
        muted
        playsinline
        webkit-playsinline="true"
        preload="auto"
        aria-label="Lion intro video"
      >
        <source src="/archetype-card/lion-run.mp4" type="video/mp4" />
      </video>

      <div id="lionStillIntro" class="intro-still" aria-hidden="true">
        <div class="intro-still-graphic" role="presentation"></div>
      </div>

      <div class="intro-overlay" aria-live="polite">
        <h1 class="intro-title">Entering the <span class="accent">Lion&rsquo;s Den</span></h1>
      </div>

      <button id="skipIntro" class="intro-skip" type="button" aria-label="Skip intro">Continue</button>
    </main>

    <script src="/js/intro-gate.js" defer></script>
  </body>
</html>
