<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Garvey Dashboard</title>
</head>
<body>
  <h1>Tenant Dashboard</h1>
  <input id="tenant" placeholder="Tenant slug" value="test-business" />
  <button onclick="loadDashboard()">Load Dashboard</button>

  <ul>
    <li id="users">Users: -</li>
    <li id="visits">Visits: -</li>
    <li id="actions">Actions: -</li>
    <li id="points">Points Issued: -</li>
  </ul>

  <h2>Top Actions</h2>
  <ul id="topActions"></ul>

  <h2>Simple Analytics</h2>
  <p id="analytics"></p>

  <script>
    async function loadDashboard() {
      const tenant = document.getElementById("tenant").value;
      const res = await fetch(`/t/${tenant}/dashboard`);
      const data = await res.json();

      if (!res.ok) {
        document.getElementById("analytics").innerText = data.error || "Failed to load dashboard.";
        return;
      }

      document.getElementById("users").innerText = `Users: ${data.total_users}`;
      document.getElementById("visits").innerText = `Visits: ${data.total_visits}`;
      document.getElementById("actions").innerText = `Actions: ${data.total_actions}`;
      document.getElementById("points").innerText = `Points Issued: ${data.total_points}`;

      const topActions = document.getElementById("topActions");
      topActions.innerHTML = "";
      data.top_actions.forEach((row) => {
        const li = document.createElement("li");
        li.innerText = `${row.action_type}: ${row.action_count}`;
        topActions.appendChild(li);
      });

      const actionsPerUser = data.total_users > 0
        ? (data.total_actions / data.total_users).toFixed(2)
        : "0.00";

      document.getElementById("analytics").innerText =
        `Actions per user: ${actionsPerUser}. Refresh after new actions to see live changes.`;
    }

    setInterval(loadDashboard, 10000);
    loadDashboard();
  </script>
</body>
</html>
