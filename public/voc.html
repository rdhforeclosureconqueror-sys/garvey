<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Voice of Customer</title>

<style>
body {
  background:black;
  color:white;
  font-family:Arial;
  text-align:center;
  padding:20px;
}

.card {
  max-width:700px;
  margin:auto;
}

input {
  padding:10px;
  margin:6px;
  width:90%;
  border-radius:8px;
}

.btn {
  background:gold;
  padding:12px;
  margin:8px auto;
  display:block;
  width:90%;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.btn:hover {
  background:red;
  color:white;
}

.progress {
  margin:10px 0;
  font-size:12px;
  color:#aaa;
}
</style>
</head>

<body>

<div class="card">

<h1>🎤 Voice of the Customer</h1>

<input id="email" placeholder="Email" />

<div class="progress" id="progress"></div>

<h3 id="questionText">Loading...</h3>
<div id="optionsContainer"></div>

</div>

<script src="/js/api-contract.js"></script>
<script>
"use strict";

const { ENDPOINTS, buildUrl } = window.GarveyApi;
const REQUIRED_IDS = ["email", "progress", "questionText", "optionsContainer"];

/* ================================ */
let questions = [];
let currentIndex = 0;
let answers = [];

function getTenant() {
  return new URLSearchParams(window.location.search).get("tenant") || "test-business";
}

/* ================================ */
async function loadQuestions() {
  try {
    const res = await fetch(
      buildUrl(ENDPOINTS.questions, { assessment: "customer", ts: Date.now() })
    );

    const data = await res.json();

    if (!res.ok || !Array.isArray(data.questions)) {
      throw new Error(data?.error || "No questions");
    }

    questions = data.questions.map((q, i) => ({
      qid: q.qid || `CU${i + 1}`,
      question_text: q.question_text || q.question || "",
      option_a: q.option_a,
      option_b: q.option_b,
      option_c: q.option_c,
      option_d: q.option_d
    }));
    if (!questions.length || !questions[0].question_text || !questions[0].option_a) {
      throw new Error("Questions payload missing display text/options");
    }
    renderQuestion();

  } catch (err) {
    showError("Failed to load questions");
  }
}

/* ================================ */
function renderQuestion() {
  const q = questions[currentIndex];

  if (!q) return submit();

  document.getElementById("questionText").innerText = q.question_text;

  const container = document.getElementById("optionsContainer");
  container.innerHTML = "";

  [
    ["A", q.option_a],
    ["B", q.option_b],
    ["C", q.option_c],
    ["D", q.option_d]
  ].forEach(([k, v]) => {
    if (!v) return;

    const btn = document.createElement("button");
    btn.className = "btn";
    btn.innerText = `${k}: ${v}`;
    btn.onclick = () => select(k);
    container.appendChild(btn);
  });

  updateProgress();
}

/* ================================ */
function select(letter) {
  const q = questions[currentIndex];

  answers.push({
    qid: q.qid,
    answer: letter
  });

  currentIndex++;
  renderQuestion();
}

/* ================================ */
function updateProgress() {
  const total = questions.length;
  const done = currentIndex;

  document.getElementById("progress").innerText =
    `Question ${done + 1} of ${total}`;
}

/* ================================ */
async function submit() {
  const email = document.getElementById("email").value;
  const tenant = getTenant();

  if (!email) {
    alert("Enter email");
    return;
  }

  try {
    const res = await fetch(buildUrl(ENDPOINTS.vocIntake), {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ email, tenant, answers })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data?.error || "Submit failed");

    document.body.innerHTML = `
      <h1>✅ VOC Complete</h1>
      <pre>${JSON.stringify(data, null, 2)}</pre>
      <button onclick="goDashboard()">Go to Dashboard</button>
    `;

  } catch (err) {
    showError(err?.message || "Submit failed");
  }
}

/* ================================ */
function goDashboard() {
  const tenant = getTenant();
  window.location.href = `/dashboard.html?tenant=${tenant}`;
}

/* ================================ */
function showError(msg) {
  document.getElementById("questionText").innerText = "❌ " + msg;
}

document.addEventListener("DOMContentLoaded", () => {
  const missing = REQUIRED_IDS.filter((id) => !document.getElementById(id));
  if (missing.length) {
    showError(`Missing DOM elements: ${missing.join(", ")}`);
    return;
  }
  loadQuestions();
});
</script>

</body>
</html>
