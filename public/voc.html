<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Garvey VOC Intake</title>

  <style>
    body { font-family: Arial, sans-serif; background:#000; color:#fff; text-align:center; padding:24px; }
    .card { background:#111; border:2px solid gold; padding:24px; border-radius:16px; max-width:760px; margin:0 auto; }
    h1 { color: gold; margin-top: 0; }
    .row { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin:10px 0 6px; }
    select, input {
      padding:10px; margin:8px 0; width:min(520px,92%);
      border-radius:10px; border:1px solid #334155; background:#0b1020; color:#fff;
    }
    .meta { color:#94a3b8; font-size:12px; margin-top:6px; }
    .bar { height:10px; background:#222; border-radius:999px; overflow:hidden; margin-top:10px; }
    .bar > div { height:100%; width:0%; background:#22c55e; transition: width 120ms linear; }
    .btn {
      display:block; width:100%; padding:14px; margin:10px 0;
      border-radius:10px; border:2px solid #000; background:gold; color:#000;
      font-weight:700; cursor:pointer; text-align:left;
    }
    .btn:hover { background:#ef4444; color:#fff; }
    .btn:disabled { opacity:0.6; cursor:not-allowed; }
    pre { background:#0b1020; border:1px solid #334155; border-radius:10px; padding:12px; overflow:auto; text-align:left; }
    a { color:#93c5fd; } a:hover { color:#bfdbfe; }
    .err { color:#fca5a5; }
  </style>
</head>

<body>
  <div class="card">
    <h1>Customer Voice (VOC) Intake</h1>

    <div class="row">
      <input id="email" placeholder="Email" value="customer@test.com" />
      <input id="tenant" placeholder="Tenant slug" value="test-business" />
    </div>

    <div class="meta" id="apiMeta"></div>
    <div class="meta" id="status"></div>

    <div class="meta" id="progressText">Loading…</div>
    <div class="bar"><div id="progressFill"></div></div>

    <div style="margin-top:14px; font-size:18px;" id="questionText"></div>
    <div id="optionsContainer"></div>

    <button class="btn" id="submitBtn" type="button" disabled onclick="submitVOC()">Submit VOC</button>

    <h3 style="color:#93c5fd; margin-top:18px;">Result</h3>
    <pre id="result">{}</pre>

    <div class="meta" style="margin-top:14px;">
      <a href="/intake.html">Intake</a> |
      <a href="/dashboard.html">Dashboard</a> |
      <a href="/admin.html">Admin</a> |
      <a href="/index.html">CX Engine</a>
    </div>
  </div>

  <script>
    const API_BASE = (() => {
      const host = window.location.hostname || "";
      if (host.includes("garveyfrontend")) return "https://garveybackend.onrender.com";
      return "";
    })();

    let questions = [];
    let currentIndex = 0;
    const answers = []; // still A/B/C/D array for /voc-intake (backend expects this today)

    function setMeta() {
      document.getElementById("apiMeta").innerText =
        API_BASE ? `API: ${API_BASE}` : "API: same-origin";

      const params = new URLSearchParams(window.location.search);
      const t = (params.get("tenant") || "").trim();
      if (t) document.getElementById("tenant").value = t;
    }

    function setStatus(msg, isErr = false) {
      const el = document.getElementById("status");
      el.className = isErr ? "meta err" : "meta";
      el.innerText = msg || "";
    }

    function renderProgress() {
      const total = Math.max(questions.length, 1);
      const pct = Math.round((answers.length / total) * 100);
      document.getElementById("progressFill").style.width = `${pct}%`;
      document.getElementById("progressText").innerText =
        questions.length
          ? `Question ${Math.min(answers.length + 1, questions.length)} of ${questions.length} (${pct}%)`
          : "Loading…";

      document.getElementById("submitBtn").disabled = !(questions.length && answers.length === questions.length);
    }

    async function loadQuestions() {
      try {
        setStatus("Loading questions…");
        answers.length = 0;
        currentIndex = 0;

        // VOC uses 25 questions from the same pool (fast)
        const url = `${API_BASE}/api/questions?mode=25`;
        const res = await fetch(url);
        const data = await res.json();

        if (!res.ok) throw new Error(data?.error || "Failed to load questions");

        questions = Array.isArray(data.questions) ? data.questions : [];
        if (!questions.length) throw new Error("No questions returned (seed may have failed)");

        setStatus("OK");
        showQuestion();
      } catch (err) {
        console.error(err);
        setStatus(err.message, true);
        document.getElementById("questionText").innerText = "❌ Failed to load questions";
        document.getElementById("optionsContainer").innerHTML = "";
        document.getElementById("submitBtn").disabled = true;
        document.getElementById("progressFill").style.width = "0%";
        document.getElementById("progressText").innerText = err.message;
      }
    }

    function showQuestion() {
      renderProgress();

      const q = questions[currentIndex];
      if (!q) {
        document.getElementById("questionText").innerText = "Ready to submit VOC";
        document.getElementById("optionsContainer").innerHTML = "";
        return;
      }

      document.getElementById("questionText").innerText = q.question || `Question ${currentIndex + 1}`;

      const container = document.getElementById("optionsContainer");
      container.innerHTML = "";

      const options = [
        ["A", q.option_a],
        ["B", q.option_b],
        ["C", q.option_c],
        ["D", q.option_d]
      ];

      for (const [key, value] of options) {
        const btn = document.createElement("button");
        btn.className = "btn";
        btn.innerText = `${key}: ${value || ""}`;
        btn.disabled = !value;
        btn.onclick = () => selectAnswer(key);
        container.appendChild(btn);
      }
    }

    function selectAnswer(letter) {
      if (currentIndex >= questions.length) return;
      answers.push(letter);
      currentIndex += 1;
      showQuestion();
    }

    async function readJsonOrText(res) {
      const ct = (res.headers.get("content-type") || "").toLowerCase();
      if (ct.includes("application/json")) return await res.json();
      return await res.text();
    }

    async function submitVOC() {
      const email = (document.getElementById("email").value || "").trim();
      const tenant_slug = (document.getElementById("tenant").value || "").trim();

      if (!email || !tenant_slug) {
        setStatus("Email and tenant slug are required.", true);
        return;
      }

      try {
        setStatus("Submitting…");
        const res = await fetch(`${API_BASE}/voc-intake`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, tenant_slug, answers })
        });

        const data = await readJsonOrText(res);

        if (!res.ok) {
          const msg = typeof data === "string" ? data : (data?.error || "VOC submit failed");
          setStatus(msg, true);
          document.getElementById("result").innerText = JSON.stringify(data, null, 2);
          return;
        }

        setStatus("Submitted.");
        document.getElementById("result").innerText =
          typeof data === "string" ? data : JSON.stringify(data, null, 2);
      } catch (err) {
        console.error(err);
        setStatus(`Error: ${err.message}`, true);
      }
    }

    setMeta();
    loadQuestions();
  </script>
</body>
</html>
