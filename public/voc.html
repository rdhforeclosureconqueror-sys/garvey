<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VOC Intake</title>

<style>
body { background:black; color:white; font-family:Arial; text-align:center; padding:20px; }
.btn { background:gold; padding:12px; margin:8px 0; display:block; width:100%; border-radius:10px; cursor:pointer; }
</style>
</head>

<body>

<h1>🎤 Voice of the Customer</h1>

<input id="email" placeholder="Email" />
<input id="tenant" placeholder="Tenant" />

<div id="questionText"></div>
<div id="optionsContainer"></div>

<script>
const API_BASE = (() => {
  if (window.location.hostname.includes("garveyfrontend")) {
    return "https://garveybackend.onrender.com";
  }
  return "";
})();

let questions = [];
let currentIndex = 0;
let answers = [];

// ================================
// LOAD QUESTIONS (FIXED)
// ================================

async function loadQuestions() {
  const res = await fetch(
    `${API_BASE}/api/questions?assessment=customer&ts=${Date.now()}`,
    { cache: "no-store" }
  );

  const data = await res.json();
  questions = data.questions || [];

  renderQuestion();
}

// ================================
// RENDER
// ================================

function renderQuestion() {
  const q = questions[currentIndex];

  if (!q) return submit();

  document.getElementById("questionText").innerText = q.question_text;

  const container = document.getElementById("optionsContainer");
  container.innerHTML = "";

  [
    ["A", q.option_a],
    ["B", q.option_b],
    ["C", q.option_c],
    ["D", q.option_d]
  ].forEach(([k, v]) => {
    const btn = document.createElement("button");
    btn.className = "btn";
    btn.innerText = `${k}: ${v}`;
    btn.onclick = () => select(k);
    container.appendChild(btn);
  });
}

// ================================
// ANSWER (NEW FORMAT)
// ================================

function select(letter) {
  const q = questions[currentIndex];

  answers.push({
    qid: q.qid,
    answer: letter
  });

  currentIndex++;
  renderQuestion();
}

// ================================
// SUBMIT
// ================================

async function submit() {
  const email = document.getElementById("email").value;
  const tenant = document.getElementById("tenant").value;

  const res = await fetch(`${API_BASE}/voc-intake`, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ email, tenant, answers })
  });

  const data = await res.json();

  document.body.innerHTML = `
    <h1>RESULT</h1>
    <pre>${JSON.stringify(data, null, 2)}</pre>
  `;
}

loadQuestions();
</script>

</body>
</html>
