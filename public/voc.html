<!-- FILE: public/voc.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Garvey VOC Intake</title>

  <style>
    body { font-family: Arial, sans-serif; background:#000; color:#fff; text-align:center; padding:24px; }
    .card { background:#111; border:2px solid gold; padding:24px; border-radius:16px; max-width:760px; margin:0 auto; }
    h1 { color: gold; margin-top: 0; }
    .row { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin:10px 0 6px; }
    select, input {
      padding:10px; margin:8px 0; width:min(520px,92%);
      border-radius:10px; border:1px solid #334155; background:#0b1020; color:#fff;
    }
    .meta { color:#94a3b8; font-size:12px; margin-top:6px; }
    .bar { height:10px; background:#222; border-radius:999px; overflow:hidden; margin-top:10px; }
    .bar > div { height:100%; width:0%; background:#22c55e; transition: width 120ms linear; }
    .btn {
      display:block; width:100%; padding:14px; margin:10px 0;
      border-radius:10px; border:2px solid #000; background:gold; color:#000;
      font-weight:700; cursor:pointer; text-align:center;
    }
    .btn:hover { background:#ef4444; color:#fff; }
    .btn:disabled { opacity:0.6; cursor:not-allowed; }
    pre { background:#0b1020; border:1px solid #334155; border-radius:10px; padding:12px; overflow:auto; text-align:left; }
    a { color:#93c5fd; } a:hover { color:#bfdbfe; }
    .err { color:#fca5a5; }
  </style>
</head>

<body>
  <div class="card">
    <h1>Customer Voice (VOC) Intake</h1>

    <div class="row">
      <input id="email" placeholder="Email" value="customer@test.com" />
      <input id="tenant" placeholder="Tenant slug" value="test-business" />
    </div>

    <div class="meta" id="apiMeta"></div>
    <div class="meta" id="progressText">Loading…</div>
    <div class="bar"><div id="progressFill"></div></div>

    <div style="margin-top:14px;">
      <button class="btn" type="button" onclick="selectAnswer('A')">A</button>
      <button class="btn" type="button" onclick="selectAnswer('B')">B</button>
      <button class="btn" type="button" onclick="selectAnswer('C')">C</button>
      <button class="btn" type="button" onclick="selectAnswer('D')">D</button>
    </div>

    <button class="btn" id="submitBtn" type="button" disabled onclick="submitVOC()">Submit VOC</button>

    <h3 style="color:#93c5fd; margin-top:18px;">Result</h3>
    <div class="meta" id="status"></div>
    <pre id="result">{}</pre>

    <div class="meta" style="margin-top:14px;">
      <a href="/intake.html">Intake</a> |
      <a href="/dashboard.html">Dashboard</a> |
      <a href="/admin.html">Admin</a> |
      <a href="/index.html">CX Engine</a>
    </div>
  </div>

  <script>
    const API_BASE = (() => {
      const host = window.location.hostname || "";
      if (host.includes("garveyfrontend")) return "https://garveybackend.onrender.com";
      return "";
    })();

    const TOTAL = 25;
    const answers = [];

    function setMeta() {
      document.getElementById("apiMeta").innerText =
        API_BASE ? `API: ${API_BASE}` : "API: same-origin";

      const params = new URLSearchParams(window.location.search);
      const t = (params.get("tenant") || "").trim();
      if (t) document.getElementById("tenant").value = t;
    }

    function setStatus(msg, isErr = false) {
      const el = document.getElementById("status");
      el.className = isErr ? "meta err" : "meta";
      el.innerText = msg || "";
    }

    function render() {
      const pct = Math.round((answers.length / TOTAL) * 100);
      document.getElementById("progressFill").style.width = `${pct}%`;
      document.getElementById("progressText").innerText =
        answers.length < TOTAL
          ? `Question ${answers.length + 1} of ${TOTAL} (${pct}%)`
          : `Completed ${TOTAL} of ${TOTAL} (100%)`;

      document.getElementById("submitBtn").disabled = answers.length !== TOTAL;
    }

    function selectAnswer(answer) {
      if (answers.length >= TOTAL) return;
      answers.push(answer);
      render();
    }

    async function readJsonOrText(res) {
      const ct = (res.headers.get("content-type") || "").toLowerCase();
      if (ct.includes("application/json")) return await res.json();
      return await res.text();
    }

    async function submitVOC() {
      const email = (document.getElementById("email").value || "").trim();
      const tenant_slug = (document.getElementById("tenant").value || "").trim();

      if (!email || !tenant_slug) {
        setStatus("Email and tenant slug are required.", true);
        return;
      }

      try {
        setStatus("Submitting…");
        const res = await fetch(`${API_BASE}/voc-intake`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, tenant_slug, answers })
        });

        const data = await readJsonOrText(res);

        if (!res.ok) {
          const msg = typeof data === "string" ? data : (data?.error || "VOC submit failed");
          setStatus(msg, true);
          document.getElementById("result").innerText = JSON.stringify(data, null, 2);
          return;
        }

        setStatus("Submitted.");
        document.getElementById("result").innerText = JSON.stringify(data, null, 2);
      } catch (err) {
        console.error(err);
        setStatus(`Error: ${err.message}`, true);
      }
    }

    setMeta();
    render();
  </script>
</body>
</html>
