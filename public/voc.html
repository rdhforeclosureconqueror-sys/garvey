<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Voice of Customer</title>
<style>
body { background:black; color:white; font-family:Arial; text-align:center; padding:20px; }
.card { max-width:760px; margin:auto; }
input { padding:10px; margin:6px; width:90%; border-radius:8px; }
.btn { background:gold; padding:12px; margin:8px auto; display:block; width:90%; border-radius:10px; cursor:pointer; font-weight:bold; text-decoration:none; color:black; border:0; }
.btn:hover { background:red; color:white; }
.progress { margin:10px 0; font-size:12px; color:#aaa; }
.result-card { background:#111827; border:1px solid #334155; border-radius:12px; padding:12px; margin:10px auto; text-align:left; }
.bar-track { background:#1f2937; border-radius:999px; overflow:hidden; height:10px; }
.bar-fill { background:gold; height:10px; }
</style>
</head>
<body>
<div class="card">
<h1>🎤 Voice of the Customer</h1>
<input id="name" placeholder="Name" />
<input id="email" placeholder="Email" />
<div class="progress" id="progress"></div>
<h3 id="questionText">Loading...</h3>
<div id="optionsContainer"></div>
</div>
<script src="/js/api-contract.js"></script>
<script src="/garvey_ui.js"></script>
<script>
"use strict";
const { ENDPOINTS, buildUrl } = window.GarveyApi;
let questions = [];
let currentIndex = 0;
let answers = [];
const ACTIVE_CUSTOMER_KEY = "garvey_active_customer_v1";

function getTenant() { return (new URLSearchParams(window.location.search).get("tenant") || "test-business").trim(); }
function getCid() { return (new URLSearchParams(window.location.search).get("cid") || "").trim(); }
function getEmail() { return (new URLSearchParams(window.location.search).get("email") || "").trim().toLowerCase(); }
function getName() { return (new URLSearchParams(window.location.search).get("name") || "").trim(); }
function escapeHtml(s) { return String(s || "").replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c])); }
function safeTrim(v) { return String(v ?? "").trim(); }

function readActiveCustomer() {
  const raw = (() => {
    try { return sessionStorage.getItem(ACTIVE_CUSTOMER_KEY) || localStorage.getItem(ACTIVE_CUSTOMER_KEY); } catch (_) { return ""; }
  })();
  if (!raw) return null;
  try {
    const parsed = JSON.parse(raw);
    return {
      tenant: safeTrim(parsed.tenant),
      email: safeTrim(parsed.email).toLowerCase(),
      name: safeTrim(parsed.name),
      cid: safeTrim(parsed.cid),
      rid: safeTrim(parsed.rid),
    };
  } catch (_) {
    return null;
  }
}

function writeActiveCustomer(next) {
  const existing = readActiveCustomer() || {};
  const merged = {
    tenant: safeTrim(next?.tenant || existing.tenant),
    email: safeTrim(next?.email || existing.email).toLowerCase(),
    name: safeTrim(next?.name || existing.name),
    cid: safeTrim(next?.cid || existing.cid),
    rid: safeTrim(next?.rid || existing.rid),
    ts: Date.now(),
  };
  if (!merged.tenant || !merged.email) return null;
  try {
    const encoded = JSON.stringify(merged);
    sessionStorage.setItem(ACTIVE_CUSTOMER_KEY, encoded);
    localStorage.setItem(ACTIVE_CUSTOMER_KEY, encoded);
  } catch (_) {}
  return merged;
}

function resolveIdentity() {
  const tenant = getTenant();
  const active = readActiveCustomer();
  const login = window.GARVEY && window.GARVEY.loginCtx ? window.GARVEY.loginCtx() : {};
  const queryEmail = getEmail();
  const queryName = getName();
  const activeValid = active && active.tenant === tenant && active.email;
  const loginValid = login && safeTrim(login.tenant) === tenant && safeTrim(login.email);

  return {
    tenant,
    cid: getCid() || (activeValid ? active.cid : "") || (loginValid ? safeTrim(login.cid) : ""),
    rid: (activeValid ? active.rid : "") || (loginValid ? safeTrim(login.rid) : ""),
    email: (activeValid ? active.email : "") || (loginValid ? safeTrim(login.email).toLowerCase() : "") || queryEmail,
    name: (activeValid ? active.name : "") || queryName,
    identified: !!(activeValid || loginValid),
  };
}

function hydrateIdentity() {
  const identity = resolveIdentity();
  const emailInput = document.getElementById("email");
  const nameInput = document.getElementById("name");
  const progress = document.getElementById("progress");
  if (!emailInput || !nameInput || !progress) return identity;

  emailInput.value = identity.email || "";
  nameInput.value = identity.name || "";
  emailInput.readOnly = !!identity.identified;
  emailInput.setAttribute("aria-readonly", identity.identified ? "true" : "false");
  progress.innerText = identity.identified
    ? `Signed in customer: ${identity.email}`
    : "No active customer session found. Identify customer in Rewards first.";
  return identity;
}

async function loadQuestions() {
  try {
    const res = await fetch(buildUrl(ENDPOINTS.questions, { assessment: "customer", ts: Date.now() }));
    const data = await res.json();
    if (!res.ok || !Array.isArray(data.questions)) throw new Error(data?.error || "No questions");
    questions = data.questions.map((q) => ({
      qid: q.qid,
      question_text: q.prompt || q.question_text || q.question || "",
      options: q.options || [
        { key: "A", label: q.option_a }, { key: "B", label: q.option_b }, { key: "C", label: q.option_c }, { key: "D", label: q.option_d }
      ]
    }));
    renderQuestion();
  } catch (_) {
    showError("Failed to load questions");
  }
}

function renderQuestion() {
  const q = questions[currentIndex];
  if (!q) return submit();
  document.getElementById("questionText").innerText = q.question_text;
  const container = document.getElementById("optionsContainer");
  container.innerHTML = "";
  q.options.forEach((opt) => {
    if (!opt?.label) return;
    const btn = document.createElement("button");
    btn.className = "btn";
    btn.innerText = `${opt.key}: ${opt.label}`;
    btn.onclick = () => {
      answers.push({ qid: q.qid, answer: opt.key });
      currentIndex++;
      renderQuestion();
    };
    container.appendChild(btn);
  });
  document.getElementById("progress").innerText = `Question ${currentIndex + 1} of ${questions.length}`;
}

function barsHtml(scores, primary, secondary, weakness) {
  const entries = Object.entries(scores || {});
  const total = entries.reduce((sum, [,v]) => sum + Number(v || 0), 0) || 1;
  return entries.sort((a,b) => Number(b[1]) - Number(a[1])).map(([k,v]) => {
    const pct = Math.round((Number(v || 0) / total) * 100);
    const tags = [k===primary?"Primary":"", k===secondary?"Secondary":"", k===weakness?"Weakness":""].filter(Boolean).join(", ");
    return `<div style="margin:8px 0;"><div style="display:flex;justify-content:space-between;font-size:12px;"><span>${escapeHtml(k)} ${tags ? `(${tags})` : ""}</span><span>${pct}%</span></div><div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div></div>`;
  }).join("");
}

async function submit() {
  const identity = resolveIdentity();
  const email = safeTrim(identity.email || document.getElementById("email").value).toLowerCase();
  const name = safeTrim(document.getElementById("name").value || identity.name);
  const tenant = identity.tenant;
  const cid = identity.cid;
  const missing = [];
  if (!tenant) missing.push("tenant");
  if (!email) missing.push("email");
  if (!name) missing.push("name");
  if (!Array.isArray(answers) || !answers.length) missing.push("answers");
  if (missing.length) return alert("Missing required fields: " + missing.join(", "));

  try {
    const res = await fetch(buildUrl(ENDPOINTS.vocIntake), {
      method: "POST",
      headers: { "Content-Type":"application/json" },
      credentials: "include",
      body: JSON.stringify({ email, name, tenant, cid, answers })
    });
    const data = await res.json();
    if (!res.ok) {
      const errDetails = [data?.error, data?.details].filter(Boolean).join(" — ");
      throw new Error(errDetails || "Submit failed");
    }

    const crid = String(data?.result_id ?? data?.result?.result_id ?? "").trim();
    writeActiveCustomer({ tenant, email, name, cid, rid: crid || identity.rid });
    if (window.GARVEY && window.GARVEY.setLoginCtx) {
      window.GARVEY.setLoginCtx({ tenant, email, cid, rid: crid || identity.rid });
    }
    const dest = new URL('/results_customer.html', window.location.origin);
    dest.searchParams.set('tenant', tenant);
    dest.searchParams.set('email', email);
    if (cid) dest.searchParams.set('cid', cid);
    if (crid) dest.searchParams.set('crid', crid);
    window.location.href = dest.pathname + dest.search;
  } catch (err) {
    showError(err?.message || "Submit failed");
  }
}

function showError(msg) { document.getElementById("questionText").innerText = "❌ " + msg; }

document.addEventListener("DOMContentLoaded", loadQuestions);
document.addEventListener("DOMContentLoaded", () => {
  hydrateIdentity();
});
window.addEventListener("pageshow", () => {
  hydrateIdentity();
});
</script>
</body>
</html>
