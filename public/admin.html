<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Garvey Experience Engine</title>

<style>
body {
  font-family: Arial;
  background:#000;
  color:#fff;
  padding:24px;
}

.card {
  background:#111;
  border:2px solid gold;
  padding:24px;
  border-radius:16px;
  max-width:900px;
  margin:auto;
}

h1 { color:gold; }

.btn {
  padding:12px;
  background:gold;
  color:black;
  font-weight:bold;
  border-radius:10px;
  text-decoration:none;
  display:inline-block;
  margin:6px;
}

.btn:hover {
  background:red;
  color:white;
}
</style>
</head>

<body>

<div class="card">

<h1>Garvey Experience Engine</h1>

<div id="tenantDisplay"></div>

<div>

<a class="btn" id="businessBtn">🧠 Business Assessment</a>
<a class="btn" id="vocBtn">🗣️ Customer VOC</a>
<a class="btn" id="actionsBtn">⚡ Earn Points</a>
<a class="btn" id="dashboardBtn">📊 Dashboard</a>

</div>

</div>

<script>
function getTenant() {
  return new URLSearchParams(window.location.search).get("tenant") || "test-business";
}

function init() {
  const t = getTenant();
  const enc = encodeURIComponent(t);

  document.getElementById("tenantDisplay").innerText = "Tenant: " + t;

  document.getElementById("businessBtn").href =
    `/intake.html?tenant=${enc}&assessment=business_owner`;

  document.getElementById("vocBtn").href =
    `/voc.html?tenant=${enc}`;

  document.getElementById("actionsBtn").href =
    `/index.html?tenant=${enc}`;

  document.getElementById("dashboardBtn").href =
    `/dashboard.html?tenant=${enc}`;
}

init();
</script>

</body>
</html>
