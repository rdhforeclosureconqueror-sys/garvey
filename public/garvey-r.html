<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GARVEY — R (Route)</title>
  <link rel="stylesheet" href="/garvey_ui.css">
  <script src="/garvey_ui.js" defer></script>
</head>
<body>
<header class="topbar"><div class="topbar-inner"><div class="brand">GARVEY • R</div><button class="btn mobile-toggle" data-mobile-toggle type="button">Menu</button><nav class="nav-links"><a class="btn" data-tenant-href="/garvey_premium.html" href="#">Back to Premium</a><a class="btn" data-tenant-href="/garvey.html" href="#">Fallback Hub</a></nav></div></header>
<main class="wrap">
  <section class="card reveal"><div class="row"><span class="pill" data-tenant-label></span><a class="btn" data-tenant-href="/garvey_premium.html" href="#">Back</a></div><h1>R — Route</h1><p class="muted">Use the board as the single source of truth for route execution.</p></section>
  <section class="kanban-wrap reveal"><div id="kanban"></div></section>
</main>
<script type="module">
import { ensureBoard, getBoard, getCards, createCard, moveCard, renderKanban } from "/garvey-kanban.js";
const phase = "R";
const mount = document.getElementById("kanban");
const tenant = window.GARVEY_UI.requireTenant(mount);
if (tenant) {
  const refresh = async () => {
    await ensureBoard(tenant);
    const b = await getBoard(tenant);
    const c = await getCards(tenant, phase);
    renderKanban({
      mount, tenant, phase,
      columns: b.columns || [], cards: c.cards || [],
      onCreate: async (payload) => { await createCard(payload); await refresh(); },
      onMove: async (id, to) => { await moveCard(id, to); await refresh(); },
    });
  };
  refresh();
}
</script>
</body>
</html>
